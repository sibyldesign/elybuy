<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伊利小編購後台 | 智慧雲端管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-stone-800 font-sans p-4 sm:p-6">
<div class="max-w-7xl mx-auto relative bg-white">

  <div class="flex flex-col sm:flex-row justify-between items-center border-b pb-4 mb-6">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
      <div class="w-12 h-12 rounded-full overflow-hidden border shadow-sm"><img src="https://i.postimg.cc/x887dL6Q/line-oa-chat-260617-163106.jpg" class="w-full h-full object-cover"></div>
      <div class="text-left">
        <h1 class="text-xl font-bold text-stone-800">伊利小編購 智慧管理後台</h1>
        <p class="text-xs text-stone-400 mt-0.5">2026 團購平鋪型雙端控制中樞</p>
      </div>
    </div>
    <a id="viewStoreLink" href="https://sibyldesign.github.io/yili-select/Index.html" target="_blank" class="bg-stone-700 text-white text-xs font-bold px-4 py-2.5 rounded-lg shadow-sm">🌐 前往行動商城</a>
  </div>

  <div class="flex gap-1 border-b overflow-x-auto mb-6">
    <button onclick="switchTab('uploadTab')" id="btn-uploadTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-stone-700 text-stone-800 bg-white rounded-t-lg">商品快速上架</button>
    <button onclick="switchTab('listTab')" id="btn-listTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400">商品清單</button>
    <button onclick="switchTab('orderTab')" id="btn-orderTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400">訂單看板</button>
  </div>

  <div id="adminAlertModal" class="fixed inset-0 bg-black/40 backdrop-blur-[1px] hidden z-[5000] items-center justify-center p-4">
    <div class="bg-white w-full max-w-xs rounded-xl p-5 shadow-xl text-center space-y-3 border">
      <div id="adminAlertText" class="text-xs font-medium text-stone-700 leading-relaxed"></div>
      <button onclick="closeAdminAlert()" class="bg-stone-700 text-white text-xs px-5 py-2 rounded-lg font-medium w-full shadow">確 認</button>
    </div>
  </div>

  <div id="uploadTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4">
    <h2 class="text-sm font-bold border-b pb-2 text-stone-700">✍ 快速上架</h2>
    <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">商品貨號</label><input type="text" id="pSku" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
      <div class="sm:col-span-2"><label class="text-xs font-semibold text-stone-600 block mb-1">商品品名</label><input type="text" id="pName" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">到貨日期</label><input type="date" id="pArrivalDate" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">商品狀態</label><select id="pStatus" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"><option value="上架">上架</option><option value="下架">下架</option></select></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">主分類</label><select id="pMajorSelect" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></select></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">副分類</label><select id="pSubSelect" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></select></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">特色標籤</label><input type="text" id="pTag" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">規格一清單</label><input type="text" id="pColors" oninput="regenerateMatrixFromInputs()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none" placeholder="例如：小箱,大箱"></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">規格二清單</label><input type="text" id="pSizes" oninput="regenerateMatrixFromInputs()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none" placeholder="例如：A級特選,B級次選"></div>
    </div>
    <div class="bg-stone-50 p-4 border rounded-xl">
      <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold text-stone-700">💰 規格細部定價配置區</span><button onclick="fireBatchSetMatrix()" class="bg-stone-700 text-white text-[10px] px-2.5 py-1 rounded shadow-sm">⚡ 批量統一填入價格</button></div>
      <table class="w-full text-left text-xs bg-white border">
        <thead><tr class="bg-stone-100 text-stone-600"><th class="p-2">組合規格</th><th class="p-2 w-28">原價</th><th class="p-2 w-28">特價</th><th class="p-2 w-24">庫存</th></tr></thead>
        <tbody id="matrixTableBody"></tbody>
      </table>
    </div>
    
    <div class="border-2 border-dashed border-stone-300 rounded-xl p-5 text-center bg-stone-50 cursor-pointer hover:bg-stone-100" onclick="document.getElementById('bbFileInput').click()">
      <span class="text-xs font-bold text-stone-600 block">┼ 點擊選取相片高速非同步上傳到 ImgBB 圖床</span>
      <input type="file" id="bbFileInput" accept="image/*" multiple class="hidden" onchange="uploadToImgBB(this.files)">
      <div id="uploadStatusText" class="text-[11px] text-stone-400 mt-1">圖床金鑰串接完畢</div>
    </div>
    <div><label class="text-xs font-semibold text-stone-600 block mb-1">圖片網址紀錄欄</label><textarea id="pImgs" rows="3" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></textarea></div>
    <div><label class="text-xs font-semibold text-stone-600 block mb-1">商品敘述與短文細節</label><textarea id="pDesc" rows="2" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></textarea></div>
    <button onclick="publishProduct()" id="submitProductBtn" class="w-full bg-stone-700 text-white font-medium text-sm py-3 rounded-lg shadow-md hover:bg-stone-800">一鍵即時確認商品網頁上架</button>
    <button onclick="resetProductForm()" id="cancelEditBtn" class="w-full bg-stone-400 text-white font-medium text-sm py-2 rounded-lg hidden">取消編輯返回全新上架</button>
  </div>

  <div id="listTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4 hidden">
    <div class="flex justify-between items-center"><h2 class="text-sm font-bold text-stone-700">📋 商品清單 (20筆一頁)</h2><input type="text" id="inventorySearchInput" oninput="searchInventory()" class="text-xs p-2 border rounded-lg max-w-xs bg-stone-50 outline-none" placeholder="快速篩選貨號或品名..."></div>
    <div class="bg-stone-100 p-2.5 rounded-lg flex items-center flex-wrap gap-2 text-xs">
      <button onclick="fireBatchCopy()" class="bg-stone-600 text-white px-3 py-1.5 rounded hover:bg-stone-700">複製勾選商品</button>
      <button onclick="fireBatchArchive()" class="bg-amber-600 text-white px-3 py-1.5 rounded">封存勾選商品</button>
      <button onclick="fireBatchDeleteProducts()" class="bg-red-600 text-white px-3 py-1.5 rounded">徹底刪除商品</button>
    </div>
    <div class="overflow-x-auto border rounded-lg">
      <table class="w-full text-left text-xs bg-white">
        <thead class="bg-stone-50 border-b">
          <tr><th class="p-3 w-8"><input type="checkbox" id="selectAllProductsBox" onchange="toggleAllProducts(this)"></th><th class="p-3">主圖</th><th class="p-3">主貨號</th><th class="p-3">商品品名</th><th class="p-3">主/副分類</th><th class="p-3">單價</th><th class="p-3 text-amber-700 font-bold">到貨日期</th><th class="p-3">狀態</th><th class="p-3">編輯</th></tr>
        </thead>
        <tbody id="inventoryTableBody" class="divide-y divide-stone-100"></tbody>
      </table>
    </div>
    <div class="flex justify-center items-center gap-4 text-xs font-bold pt-2">
      <button id="prevInvBtn" onclick="changeInvPage(-1)" class="px-3 py-1.5 bg-stone-100 border rounded">上一頁</button>
      <span id="invPageText" class="text-stone-700">第 1 / 1 頁</span>
      <button id="nextInvBtn" onclick="changeInvPage(1)" class="px-3 py-1.5 bg-stone-100 border rounded">下一頁</button>
    </div>
  </div>

  <div id="orderTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4 hidden">
    <div class="flex justify-between items-center border-b pb-2 flex-wrap gap-2">
      <h2 class="text-sm font-bold text-stone-700">📋 訂單看板</h2>
    </div>
    <div class="bg-stone-100 p-2.5 rounded-lg flex items-center gap-2 flex-wrap text-xs">
      <button onclick="fireBatchCompleteOrders()" class="bg-emerald-600 text-white px-3 py-1.5 rounded">✅ 批量結案 (移至歷史訂單)</button>
      <button onclick="fireBatchPrintPickingLists()" class="bg-blue-600 text-white px-3 py-1.5 rounded font-bold">🖨️ 批量生成揀貨單並列印</button>
      <button onclick="fireBatchExportToExcel()" class="bg-green-600 text-white px-3 py-1.5 rounded font-bold">💹 批量生成 EXCEL</button>
      <button onclick="fireBatchDeleteOrders()" class="bg-red-600 text-white px-3 py-1.5 rounded">❌ 批量徹底刪除訂單</button>
    </div>
    <div class="overflow-x-auto border rounded-lg">
      <table class="w-full text-left text-xs bg-white border-collapse">
        <thead>
          <tr class="bg-stone-50 border-b">
            <th class="p-3 w-8"><input type="checkbox" onchange="toggleAllOrders(this)"></th>
            <th class="p-3">下單時間</th><th class="p-3">單號</th><th class="p-3">明細</th><th class="p-3">金額</th><th class="p-3">客戶資訊</th>
            <th class="p-3 text-amber-800 font-bold">到貨日期</th>
            <th class="p-3 text-blue-700 font-bold">老闆點擊備註</th>
            <th class="p-3">狀態流轉</th>
          </tr>
        </thead>
        <tbody id="orderTableBody" class="divide-y divide-stone-100"></tbody>
      </table>
    </div>
    <div class="flex justify-center items-center gap-4 text-xs font-bold pt-2">
      <button onclick="changeOrderPage(-1)" id="prevOrderBtn" class="px-3 py-1.5 bg-stone-100 border rounded">上一頁</button>
      <span id="orderPageText" class="text-stone-700">第 1 / 1 頁</span>
      <button onclick="changeOrderPage(1)" id="nextOrderBtn" class="px-3 py-1.5 bg-stone-100 border rounded">下一頁</button>
    </div>
  </div>

</div>
<script>
// 🌟 異步加載機制：點選該 Tab 才發送 fetch，秒速加載拒絕卡死
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.className = "tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400 hover:text-stone-800";
  });
  document.getElementById('btn-' + id).className = "tab-btn px-5 py-3 text-sm font-medium border-b-2 border-stone-700 text-stone-800 bg-white rounded-t-lg";

  if(id === 'listTab') { currentInvPage = 1; loadInventoryData(); }
  if(id === 'orderTab') { currentOrderPage = 1; loadOrdersData(); }
}

function fireBatchSetMatrix() {
  let p = prompt("請輸入欲批次套用的特價金額："); if(!p) return;
  document.querySelectorAll('#matrixTableBody .m-price').forEach(input => { input.value = p; });
}

async function uploadToImgBB(files) {
  if(files.length === 0) return;
  const text = document.getElementById('uploadStatusText'); const area = document.getElementById('pImgs');
  text.innerText = "⏳ 圖片上傳 ImgBB 網域中..."; let urls = [];
  for (let f of files) {
    let form = new FormData(); form.append("image", f);
    try {
      let r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: form });
      let j = await r.json(); if(j.success) urls.push(j.data.url);
    } catch(e){}
  }
  if(urls.length > 0) { area.value = (area.value ? area.value + "\n" : "") + urls.join("\n"); text.innerText = "🎉 圖片全部上傳成功！"; }
}

function regenerateMatrixFromInputs() {
  const tbody = document.getElementById('matrixTableBody'); tbody.innerHTML = "";
  let colors = document.getElementById('pColors').value.split(',').map(s => s.trim()).filter(s => s !== "");
  let sizes = document.getElementById('pSizes').value.split(',').map(s => s.trim()).filter(s => s !== "");
  if(colors.length === 0) colors = ["規格1"]; if(sizes.length === 0) sizes = ["規格2"];
  colors.forEach(c => { sizes.forEach(s => { tbody.innerHTML += `<tr class="border-b" data-key="款式:${c} / ${s}"><td class="p-2">${c}/${s}</td><td><input type="text" class="m-old w-full p-1 border rounded text-xs"></td><td><input type="text" class="m-price w-full p-1 border rounded text-xs"></td><td><input type="number" class="m-stock w-full p-1 border rounded text-xs"></td></tr>`; }); });
}

function publishProduct() {
  const sku = document.getElementById('pSku').value.trim(); const name = document.getElementById('pName').value.trim();
  let specs = [], prices = [];
  document.querySelectorAll('#matrixTableBody tr').forEach(row => { let pr = row.querySelector('.m-price').value; if(pr) { specs.push({ spec: row.dataset.key, price: pr }); prices.push(pr); } });
  let method = isEditMode ? "editProduct" : "addNewProduct";
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: method, product: { sku: sku, name: name, status: document.getElementById('pStatus').value, major: document.getElementById('pMajorSelect').value, sub: document.getElementById('pSubSelect').value, tag: document.getElementById('pTag').value, desc: document.getElementById('pDesc').value, specsData: JSON.stringify(specs), price: prices.join(','), arrivalDate: document.getElementById('pArrivalDate').value, color: document.getElementById('pColors').value, size: document.getElementById('pSizes').value } }) }).then(() => { resetProductForm(); switchTab('listTab'); });
}

function resetProductForm() { isEditMode = false; document.getElementById('pSku').disabled = false; document.getElementById('pSku').value = ""; document.getElementById('pName').value = ""; document.getElementById('pArrivalDate').value = ""; regenerateMatrixFromInputs(); document.getElementById('cancelEditBtn').classList.add('hidden'); }
function loadInventoryData() { fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getStoreData" }) }).then(r => r.json()).then(res => { globalProducts = res.products; filteredProducts = [...globalProducts]; renderInventoryTable(); }); }
function searchInventory() { let kw = document.getElementById('inventorySearchInput').value.toLowerCase().trim(); filteredProducts = globalProducts.filter(p => p.sku.toLowerCase().includes(kw) || p.name.toLowerCase().includes(kw)); currentInvPage = 1; renderInventoryTable(); }

// 🌟 100% 完璧歸還修復：點選編輯按鈕即可完整將 SKU 參數帶回快速上架面板
function startEdit(sku) {
  let p = globalProducts.find(x => x.sku === sku); if(!p) return;
  isEditMode = true; document.getElementById('formActionTitle').innerText = `📝 編輯商品內容 - [ ${sku} ]`;
  document.getElementById('pSku').value = p.sku; document.getElementById('pSku').disabled = true;
  document.getElementById('pName').value = p.name; document.getElementById('pStatus').value = p.status;
  document.getElementById('pColors').value = p.color; document.getElementById('pSizes').value = p.size;
  document.getElementById('pDesc').value = p.desc; document.getElementById('pImgs').value = p.allImgs.join('\n');
  if(p.arrivalDate) document.getElementById('pArrivalDate').value = p.arrivalDate;
  regenerateMatrixFromInputs();
  if(p.specsData) {
    let arr = JSON.parse(p.specsData);
    setTimeout(() => {
      document.querySelectorAll('#matrixTableBody tr').forEach(row => {
        let match = arr.find(m => m.spec === row.dataset.key);
        if(match) { row.querySelector('.m-price').value = match.price || ""; }
      });
    }, 120);
  }
  document.getElementById('cancelEditBtn').classList.remove('hidden'); switchTab('uploadTab');
}

function renderInventoryTable() {
  const tbody = document.getElementById('inventoryTableBody'); tbody.innerHTML = "";
  let total = Math.ceil(filteredProducts.length / pageSize) || 1; document.getElementById('invPageText').innerText = `第 ${currentInvPage} / ${total} 頁`;
  let start = (currentInvPage - 1) * pageSize; let end = Math.min(start + pageSize, filteredProducts.length);
  for(let i=start; i<end; i++) {
    let p = filteredProducts[i]; let displayPrice = p.price;
    if(p.color && p.color.includes(',')) { displayPrice = p.color.split(',')[0]; } 
    tbody.innerHTML += `<tr class="hover:bg-stone-50 text-xs bg-white"><td class="p-3"><input type="checkbox" class="inv-chk" value="${p.sku}"></td><td class="p-3"><img src="${p.allImgs[0]}" class="w-10 h-10 object-cover rounded"></td><td class="p-3 font-bold">${p.sku}</td><td class="p-3">${p.name}</td><td class="p-3">${p.major}/${p.sub}</td><td class="p-3 font-semibold">$${displayPrice}</td><td class="p-3 font-medium text-amber-800">${p.arrivalDate || "追加中"}</td><td class="p-3"><span>${p.status}</span></td><td class="p-3"><button onclick="startEdit('${p.sku}')" class="bg-stone-500 text-white px-2 py-1 rounded">編輯</button></td></tr>`;
  }
}
function changeInvPage(amt) { currentInvPage += amt; renderInventoryTable(); }
function toggleAllProducts(m) { document.querySelectorAll('.inv-chk').forEach(c => c.checked = m.checked); }

function fireBatchCopy() {
  let chks = document.querySelectorAll('.inv-chk:checked'); if(chks.length === 0) return alert("請勾選項目");
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchCopyProducts", skus: Array.from(chks).map(c=>c.value) }) }).then(() => loadInventoryData());
}

function loadOrdersData() { fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getAllOrders" }) }).then(r => r.json()).then(res => { rawOrders = res.orders || []; currentFilteredOrders = [...rawOrders]; renderOrderTable(); }); }

function renderOrderTable() {
  const tbody = document.getElementById('orderTableBody'); tbody.innerHTML = "";
  let total = Math.ceil(currentFilteredOrders.length / pageSize) || 1; document.getElementById('orderPageText').innerText = `第 ${currentOrderPage} / ${total} 頁`;
  let start = (currentOrderPage - 1) * pageSize; let end = Math.min(start + pageSize, currentFilteredOrders.length);

  for(let i=start; i<end; i++) {
    let o = currentFilteredOrders[i];
    tbody.innerHTML += `
    <tr class="hover:bg-stone-50 text-xs bg-white" data-order-raw='${JSON.stringify(o)}'>
      <td class="p-3"><input type="checkbox" class="order-chk" value="${o.orderId}"></td>
      <td class="p-3 font-mono text-stone-400">${o.time}</td>
      <td class="p-3 font-bold">${o.orderId}</td>
      <td class="p-3"><b>${o.prodName}</b><br><span class="text-stone-400">${o.specs}</span></td>
      <td class="p-3 font-bold">$${o.total}</td>
      <td class="p-3"><b>${o.custName}</b><br><span>Tel:${o.phone}</span></td>
      <td class="p-3 font-bold text-amber-800">${o.arrivalDate || "追加中"}</td>
      <td class="p-3 relative"><input type="text" value="${o.bossRemark || ""}" onchange="silentUpdateRemark(${o.rowIdx}, this)" class="p-1 border border-stone-300 rounded text-xs w-28 focus:border-blue-500 outline-none"><span class="status-tip text-[10px] text-stone-400 block mt-0.5"></span></td>
      <td class="p-3">
        <span class="block font-bold text-blue-600 mb-1">${o.status}</span>
        <select onchange="silentUpdateStatus(${o.rowIdx}, this)" class="block p-1 border text-[11px] rounded bg-white">
          <option value="">狀態變更...</option>
          <option value="新訂單">新訂單</option>
          <option value="已確認訂單">已確認訂單</option>
          <option value="等待到貨中">等待到貨中</option>
          <option value="延後取貨">延後取貨</option>
          <option value="已取貨">已取貨</option>
          <option value="待宅配出貨">待宅配出貨</option>
          <option value="取消不成立">取消不成立</option>
        </select>
      </td>
    </tr>`;
  }
}

// 🌟 老闆修改備註：顯示「儲存中...」並自動儲存成功
function silentUpdateRemark(rowIdx, input) {
  let tip = input.nextElementSibling; tip.innerText = "⏳ 儲存中..."; tip.className = "text-[10px] text-amber-600 block mt-0.5";
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "updateBossRemark", rowIdx: rowIdx, remark: input.value.trim() }) })
  .then(() => { tip.innerText = "✅ 已儲存"; tip.className = "text-[10px] text-green-600 block mt-0.5"; });
}

// 🌟 老闆流轉狀態：自動無感更新，不需要再重新跳轉！
function silentUpdateStatus(rowIdx, select) {
  if(!select.value) return;
  let tip = select.previousElementSibling;
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "updateOrderStatus", rowIdx: rowIdx, status: select.value }) })
  .then(() => { adminCustomAlert("🎉 狀態流轉更新成功！"); loadOrdersData(); });
}

function changeOrderPage(amt) { currentOrderPage += amt; renderOrderTable(); }
function toggleAllOrders(m) { document.querySelectorAll('.order-chk').forEach(c => c.checked = m.checked); }
function fireBatchCompleteOrders() { let chks = document.querySelectorAll('.order-chk:checked'); fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchCompleteOrders", orderIds: Array.from(chks).map(c=>c.value) }) }).then(() => loadOrdersData()); }
function fireBatchDeleteOrders() { let chks = document.querySelectorAll('.order-chk:checked'); fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchDeleteOrders", orderIds: Array.from(chks).map(c=>c.value) }) }).then(() => loadOrdersData()); }

function fireBatchExportToExcel() {
  let chks = document.querySelectorAll('.order-chk:checked'); if(chks.length === 0) return alert("請勾選項目");
  let csvContent = "\uFEFF下單時間,訂單單號,商品品名,規格細節,應付金額,客戶姓名,聯絡電話,取貨時間,到貨日期,老闆備註,訂單狀態\n";
  chks.forEach(box => { let o = JSON.parse(box.closest('tr').getAttribute('data-order-raw')); csvContent += `${o.time},${o.orderId},${o.prodName.replace(/,/g," ")},${o.specs.replace(/,/g," ")},${o.total},${o.custName},${o.phone},${o.pickupTime},${o.arrivalDate},${(o.bossRemark || "").replace(/,/g," ")},${o.status}\n`; });
  let blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" }); let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", `伊利出貨核對表.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
</script>

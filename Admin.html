<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伊利小編購後台 | 智慧雲端管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-main': '#FFFFFF', 
            'primary-taupe': '#8C857B',
            'taupe-dark': '#6E675F',
            'text-dark': '#3A3530',
            'border-soft': '#EAE6DF',
            'sibyl-gold': '#bca085'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-text-dark font-sans p-4 sm:p-6">
  <div class="max-w-7xl mx-auto relative admin-panel-ui bg-white">
    
    <div class="flex flex-col sm:flex-row justify-between items-center border-b pb-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold tracking-wider text-text-dark">伊利小編購 智慧管理後台</h1>
        <p class="text-xs text-primary-taupe mt-1">2026 旗艦無損雙維矩陣引擎</p>
      </div>
      <a id="viewStoreLink" href="#" target="_blank" class="bg-primary-taupe text-white text-xs font-medium px-4 py-2.5 rounded-lg shadow-sm">🌐 前往前台行動商城</a>
    </div>

    <div class="flex gap-1 border-b overflow-x-auto mb-6">
      <button onclick="switchTab('uploadTab')" id="btn-uploadTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-primary-taupe text-text-dark bg-white rounded-t-lg">商品快速上架</button>
      <button onclick="switchTab('listTab')" id="btn-listTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400">商品庫存總覽</button>
      <button onclick="switchTab('orderTab')" id="btn-orderTab" class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-stone-400">訂單管理看板</button>
    </div>

    <div id="uploadTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4">
      <h2 id="formActionTitle" class="text-sm font-bold border-b pb-2 text-stone-700">✍️ 上架與修改商品屬性資料</h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">商品貨號 (A欄必填)</label><input type="text" id="pSku" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
        <div class="sm:col-span-2"><label class="text-xs font-semibold text-stone-600 block mb-1">商品品名 (B欄必填)</label><input type="text" id="pName" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div>
          <label class="text-xs font-semibold text-stone-600 block mb-1">商品狀態 (C欄)</label>
          <select id="pStatus" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"><option value="上架">上架</option><option value="下架">下架</option></select>
        </div>
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">主分類 (D欄)</label><select id="pMajorSelect" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></select></div>
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">副分類 (E欄)</label><select id="pSubSelect" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></select></div>
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">特色標籤 (F欄)</label><input type="text" id="pTag" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">規格一清單 (L欄，如：大箱10斤,小箱5斤)</label><input type="text" id="pColors" oninput="regenerateMatrixFromInputs()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></div>
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">規格二清單 (M欄，如：特級A果,優級B果)</label><input type="text" id="pSizes" oninput="regenerateMatrixFromInputs()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></div>
      </div>

      <div class="bg-stone-50 p-4 border rounded-xl">
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-bold text-stone-700">💰 交叉規格細部定價配置看板 (同步產生前台 JSON 規格矩陣)</span>
          <button onclick="fireBatchSetMatrix()" class="bg-stone-700 text-white text-[10px] px-2.5 py-1 rounded">⚡ 批量統一填入價格</button>
        </div>
        <table class="w-full text-left text-xs bg-white border">
          <thead><tr class="bg-stone-100"><th class="p-2">組合規格</th><th class="p-2 w-28">原價 (J欄)</th><th class="p-2 w-28">特價單價 (K欄必填)</th><th class="p-2 w-24">庫存</th></tr></thead>
          <tbody id="matrixTableBody"></tbody>
        </table>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">加購品名稱 (選填 N 欄)</label><input type="text" id="pAddonName" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></div>
        <div><label class="text-xs font-semibold text-stone-600 block mb-1">加購品加價金額 (選填 O 欄)</label><input type="number" id="pAddonPrice" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50"></div>
      </div>

      <div class="border-2 border-dashed border-stone-300 rounded-xl p-5 text-center bg-stone-50 cursor-pointer hover:bg-stone-100 transition-all" onclick="document.getElementById('bbFileInput').click()">
        <span class="text-xs font-bold text-stone-600 block">┼ 點擊此處立即選取相簿照片上傳至 ImgBB 免費圖床</span>
        <input type="file" id="bbFileInput" accept="image/*" multiple class="hidden" onchange="uploadToImgBB(this.files)">
        <div id="uploadStatusText" class="text-[11px] text-stone-400 mt-1">Token：0f2f883b9a...</div>
      </div>

      <div><label class="text-xs font-semibold text-stone-600 block mb-1">圖片網址紀錄欄 (I欄，支援換行多圖加速功能)</label><textarea id="pImgs" rows="3" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></textarea></div>
      <div><label class="text-xs font-semibold text-stone-600 block mb-1">商品敘述短文描述 (G欄)</label><textarea id="pDesc" rows="2" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 outline-none"></textarea></div>

      <button onclick="publishProduct()" id="submitProductBtn" class="w-full bg-primary-taupe text-white font-medium text-sm py-3 rounded-lg hover:bg-taupe-dark">一鍵即時確認商品網頁上架</button>
      <button onclick="resetProductForm()" id="cancelEditBtn" class="w-full bg-stone-400 text-white font-medium text-sm py-2 rounded-lg hidden">取消編輯返回全新上架</button>
    </div>

    <div id="listTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4 hidden">
      <div class="flex justify-between items-center"><h2 class="text-sm font-bold text-stone-700">📋 商品資料清單庫存總覽 (20筆一頁)</h2><input type="text" id="inventorySearchInput" oninput="searchInventory()" class="text-xs p-2 border rounded-lg max-w-xs" placeholder="篩選貨號或品名..."></div>

      <div class="bg-stone-100 p-2.5 rounded-lg flex items-center gap-2 text-xs">
        <span class="font-bold text-stone-600">🛠️ 商品批量管理區：</span>
        <button onclick="fireBatchCopy()" class="bg-primary-taupe text-white px-3 py-1.5 rounded">複製勾選商品</button>
        <button onclick="fireBatchArchive()" class="bg-amber-600 text-white px-3 py-1.5 rounded">封存勾選商品</button>
        <button onclick="fireBatchDeleteProducts()" class="bg-red-600 text-white px-3 py-1.5 rounded">徹底刪除商品</button>
      </div>

      <div class="overflow-x-auto"><table class="w-full text-left text-xs bg-white"><thead class="bg-stone-50 border-b"><tr><th class="p-3 w-8"><input type="checkbox" id="selectAllProductsBox" onchange="toggleAllProducts(this)"></th><th class="p-3">主圖</th><th class="p-3">主貨號</th><th class="p-3">商品品名</th><th class="p-3">分類</th><th class="p-3">單價</th><th class="p-3">狀態</th><th class="p-3">管理</th></tr></thead><tbody id="inventoryTableBody" class="divide-y divide-stone-100"></tbody></table></div>
      <div class="flex justify-center items-center gap-4 text-xs font-bold pt-2">
        <button id="prevInvBtn" onclick="changeInvPage(-1)" class="px-3 py-1.5 bg-stone-100 border rounded disabled:opacity-40">上一頁</button>
        <span id="invPageText">第 1 / 1 頁</span>
        <button id="nextInvBtn" onclick="changeInvPage(1)" class="px-3 py-1.5 bg-stone-100 border rounded disabled:opacity-40">下一頁</button>
      </div>
    </div>

    <div id="orderTab" class="tab-content bg-white border rounded-xl p-5 shadow-sm space-y-4 hidden">
      <div class="flex justify-between items-center border-b pb-2 flex-wrap gap-2">
        <h2 class="text-sm font-bold text-stone-700">📋 預訂單即時看板流轉 (狀態切換視圖)</h2>
        <div class="flex bg-stone-100 p-1 rounded-lg gap-1 text-xs">
          <button onclick="filterOrderStatus('全部')" class="order-filter-btn bg-white px-3 py-1 rounded font-bold shadow-sm">全部</button>
          <button onclick="filterOrderStatus('新訂單')" class="order-filter-btn px-3 py-1 rounded">新訂單</button>
          <button onclick="filterOrderStatus('已對帳')" class="order-filter-btn px-3 py-1 rounded">已對帳</button>
          <button onclick="filterOrderStatus('已出貨')" class="order-filter-btn px-3 py-1 rounded">已出貨</button>
        </div>
      </div>
      <div class="bg-stone-100 p-2.5 rounded-lg flex items-center gap-2 text-xs">
        <button onclick="fireBatchCompleteOrders()" class="bg-emerald-600 text-white px-3 py-1.5 rounded">✅ 批量結案 (歸檔歷史訂單)</button>
        <button onclick="fireBatchPrintInvoices()" class="bg-primary-taupe text-white px-3 py-1.5 rounded">🖨️ 批量自動生成揀貨單列印</button>
        <button onclick="fireBatchDeleteOrders()" class="bg-red-600 text-white px-3 py-1.5 rounded">❌ 批量徹底刪除訂單</button>
      </div>
      <div class="overflow-x-auto"><table class="w-full text-left text-xs bg-white border-collapse"><thead><tr class="bg-stone-50 border-b"><th class="p-3 w-8"><input type="checkbox" onchange="toggleAllOrders(this)"></th><th class="p-3">時間</th><th class="p-3">單號</th><th class="p-3">預訂明細</th><th class="p-3">金額</th><th class="p-3">客戶聯絡</th><th class="p-3">取貨/配送</th><th class="p-3">變更狀態</th></tr></thead><tbody id="orderTableBody" class="divide-y divide-stone-100"></tbody></table></div>
    </div>

  </div>
  <script>
    let MASTER_GAS_URL = "https://script.google.com/macros/s/AKfycbx1M57x0n50mvw2VGlWHvDTcb-RS0BwDQAU8y9ReTSk5Wk6wFH_5GsCS0ToRM7So4OSiQ/exec";
    const IMGBB_KEY = "0f2f883b9a46cfe7b26639f93bc293d3";
    let globalProducts = [], filteredProducts = [], rawOrders = [], currentFilteredOrders = [];
    let isEditMode = false; let currentInvPage = 1, pageSize = 20;

    window.onload = function() {
      document.getElementById('viewStoreLink').href = window.location.href.replace('Admin.html','Index.html').split('?')[0];
      fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getStoreData" }) })
        .then(r => r.json()).then(res => {
          if(!res.success) return;
          const maj = document.getElementById('pMajorSelect'); const sub = document.getElementById('pSubSelect');
          maj.innerHTML = ""; sub.innerHTML = "";
          res.majorCategories.forEach(c => { maj.innerHTML += `<option value="${c}">${c}</option>`; });
          if(res.subCategories) res.subCategories.split(',').forEach(c => { sub.innerHTML += `<option value="${c.trim()}">${c.trim()}</option>`; });
          globalProducts = res.products; filteredProducts = [...globalProducts]; regenerateMatrixFromInputs();
        });
    };

    // 📸 圖片上傳 ImgBB 核心控制晶片
    async function uploadToImgBB(files) {
      if(files.length === 0) return;
      const text = document.getElementById('uploadStatusText'); const area = document.getElementById('pImgs');
      text.innerText = "⏳ 正在傳輸商品照片到 ImgBB 雲端..."; let urls = [];
      for (let f of files) {
        let form = new FormData(); form.append("image", f);
        try {
          let r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: form });
          let j = await r.json(); if(j.success) urls.push(j.data.url);
        } catch(e){}
      }
      if(urls.length > 0) { area.value = (area.value ? area.value + "\n" : "") + urls.join("\n"); text.innerText = "🎉 圖片已全部轉為雲端網址！"; }
    }

    function regenerateMatrixFromInputs() {
      const tbody = document.getElementById('matrixTableBody'); tbody.innerHTML = "";
      let colors = document.getElementById('pColors').value.split(',').map(s => s.trim()).filter(s => s !== "");
      let sizes = document.getElementById('pSizes').value.split(',').map(s => s.trim()).filter(s => s !== "");
      if(colors.length === 0) colors = ["規格1"]; if(sizes.length === 0) sizes = ["規格2"];
      colors.forEach(c => {
        sizes.forEach(s => {
          tbody.innerHTML += `<tr class="border-b border-stone-100" data-key="款式:${c} / ${s}">
            <td class="p-2 font-medium">${c} / ${s}</td><td><input type="text" class="m-old w-full p-1 border rounded text-xs"></td><td><input type="text" class="m-price w-full p-1 border rounded text-xs"></td><td><input type="number" class="m-stock w-full p-1 border rounded text-xs"></td>
          </tr>`;
        });
      });
    }
    function fireBatchSetMatrix() {
      let p = prompt("批量定價："); if(!p) return;
      document.querySelectorAll('#matrixTableBody tr').forEach(row => { row.querySelector('.m-price').value = p; });
    }
    function publishProduct() {
      const sku = document.getElementById('pSku').value.trim(); const name = document.getElementById('pName').value.trim();
      if(!sku || !name) return alert("貨號與品名必填！");
      let specs = [], prices = [], oldPrices = [];
      document.querySelectorAll('#matrixTableBody tr').forEach(row => {
        let pr = row.querySelector('.m-price').value;
        if(pr) { specs.push({ spec: row.dataset.key, oldPrice: row.querySelector('.m-old').value, price: pr, stock: row.querySelector('.m-stock').value }); prices.push(pr); oldPrices.push(row.querySelector('.m-old').value || "0"); }
      });
      let method = isEditMode ? "editProduct" : "addNewProduct";
      fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: method, product: { sku: sku, name: name, status: document.getElementById('pStatus').value, major: document.getElementById('pMajorSelect').value, sub: document.getElementById('pSubSelect').value, tag: document.getElementById('pTag').value.trim(), desc: document.getElementById('pDesc').value.trim(), imgs: document.getElementById('pImgs').value.trim(), specsData: JSON.stringify(specs), oldPrice: oldPrices.join(','), price: prices.join(','), color: document.getElementById('pColors').value.trim() || "規格1", size: document.getElementById('pSizes').value.trim() || "規格2" } }) }).then(r => r.json()).then(res => { alert(res.message); resetProductForm(); if(isEditMode) switchTab('listTab'); });
    }
    function startEdit(sku) {
      let p = globalProducts.find(x => x.sku === sku); if(!p) return;
      isEditMode = true; document.getElementById('formActionTitle').innerText = `📝 編輯商品內容 - [ ${sku} ]`;
      document.getElementById('pSku').value = p.sku; document.getElementById('pSku').disabled = true;
      document.getElementById('pName').value = p.name; document.getElementById('pStatus').value = p.status;
      document.getElementById('pColors').value = p.color; document.getElementById('pSizes').value = p.size;
      document.getElementById('pImgs').value = p.allImgs.join('\n'); document.getElementById('pDesc').value = p.desc;
      regenerateMatrixFromInputs(); document.getElementById('cancelEditBtn').classList.remove('hidden'); switchTab('uploadTab');
    }
    function resetProductForm() { isEditMode = false; document.getElementById('pSku').disabled = false; document.getElementById('pSku').value = ""; document.getElementById('pName').value = ""; document.getElementById('pColors').value = ""; document.getElementById('pSizes').value = ""; document.getElementById('pImgs').value = ""; document.getElementById('pDesc').value = ""; document.getElementById('cancelEditBtn').classList.add('hidden'); regenerateMatrixFromInputs(); }
    function loadInventoryData() { fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getStoreData" }) }).then(r => r.json()).then(res => { globalProducts = res.products; filteredProducts = [...globalProducts]; searchInventory(); }); }
    function searchInventory() { let kw = document.getElementById('inventorySearchInput').value.toLowerCase().trim(); filteredProducts = globalProducts.filter(p => p.sku.toLowerCase().includes(kw) || p.name.toLowerCase().includes(kw)); currentInvPage = 1; renderInventoryTable(); }
    function renderInventoryTable() {
      const tbody = document.getElementById('inventoryTableBody'); tbody.innerHTML = ""; let total = Math.ceil(filteredProducts.length / pageSize) || 1;
      document.getElementById('invPageText').innerText = `第 ${currentInvPage} / ${total} 頁`;
      let start = (currentInvPage - 1) * pageSize; let end = Math.min(start + pageSize, filteredProducts.length);
      for(let i=start; i<end; i++) {
        let p = filteredProducts[i];
        tbody.innerHTML += `<tr class="hover:bg-stone-50 text-xs bg-white"><td class="p-3"><input type="checkbox" class="inv-chk" value="${p.sku}"></td><td class="p-3"><img src="${p.allImgs[0]}" class="w-10 h-10 object-cover rounded shadow-sm"></td><td class="p-3 font-bold">${p.sku}</td><td class="p-3">${p.name}</td><td class="p-3">${p.major}/${p.sub}</td><td class="p-3 font-semibold">$${p.price.split(',')[0]}</td><td class="p-3"><span>${p.status}</span></td><td class="p-3"><button onclick="startEdit('${p.sku}')" class="bg-primary-taupe text-white px-2 py-1 rounded">編輯</button></td></tr>`;
      }
    }
    function changeInvPage(amt) { currentInvPage += amt; renderInventoryTable(); }
    function toggleAllProducts(m) { document.querySelectorAll('.inv-chk').forEach(c => c.checked = m.checked); }
    
    // 封存移轉至『歷史商品』分頁
    function fireBatchArchive() {
      let chks = document.querySelectorAll('.inv-chk:checked'); if(chks.length === 0) return alert("請勾選要封存的項目！");
      let skus = Array.from(chks).map(c => c.value);
      fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchArchiveProducts", skus: skus }) }).then(r => r.json()).then(res => { alert(res.message); loadInventoryData(); });
    }
    function fireBatchDeleteProducts() {
      let chks = document.querySelectorAll('.inv-chk:checked'); if(chks.length === 0) return alert("請勾選項目！");
      if(!confirm("確定彻底從雲端清退刪除？")) return;
      Promise.all(Array.from(chks).map(c => fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "deleteProduct", sku: c.value }) }))).then(() => { alert("已完成批次刪除！"); loadInventoryData(); });
    }

    function loadOrdersData() { fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getAllOrders" }) }).then(r => r.json()).then(res => { rawOrders = res.orders || []; currentFilteredOrders = [...rawOrders]; renderOrderTable(); }); }
    function filterOrderStatus(status) {
      document.querySelectorAll('.order-filter-btn').forEach(b => b.className = "order-filter-btn px-3 py-1 rounded"); event.target.className = "order-filter-btn bg-white px-3 py-1 rounded font-bold shadow-sm";
      if(status === '全部') currentFilteredOrders = [...rawOrders]; else currentFilteredOrders = rawOrders.filter(o => o.status === status);
      renderOrderTable();
    }
    function renderOrderTable() {
      const tbody = document.getElementById('orderTableBody'); tbody.innerHTML = "";
      currentFilteredOrders.forEach(o => {
        tbody.innerHTML += `<tr class="hover:bg-stone-50 text-xs bg-white"><td class="p-3"><input type="checkbox" class="order-chk" value="${o.orderId}"></td><td class="p-3">${o.time}</td><td class="p-3 font-bold">${o.orderId}</td><td class="p-3"><b>${o.prodName}</b><br><span class="text-stone-400">${o.specs}</span></td><td class="p-3 font-bold">$${o.total}</td><td class="p-3"><b>${o.custName}</b><br><span>Tel:${o.phone}</span></td><td class="p-3"><span class="bg-amber-50 text-amber-800 font-bold px-2 py-0.5 rounded">${o.pickupTime}</span></td><td class="p-3"><span>${o.status}</span><select onchange="updateRowStatus(${o.rowIdx}, this.value)" class="block mt-1 p-1 border text-[11px] rounded"><option value="">對帳更新...</option><option value="已對帳">已對帳確認</option><option value="已出貨">打包出貨完成</option></select></td></tr>`;
      });
    }
    function updateRowStatus(rowIdx, val) { if(!val) return; fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "updateOrderStatus", rowIdx: rowIdx, status: (val==="已出貨"? "已出貨":null), payStatus: (val==="已對帳"? "已確認匯款":null) }) }).then(() => loadOrdersData()); }
    function fireBatchCompleteOrders() { let chks = document.querySelectorAll('.order-chk:checked'); if(chks.length===0) return alert("請選訂單！"); fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchCompleteOrders", orderIds: Array.from(chks).map(c=>c.value) }) }).then(r=>r.json()).then(res=>{ alert(res.message); loadOrdersData(); }); }
    function fireBatchDeleteOrders() { let chks = document.querySelectorAll('.order-chk:checked'); if(chks.length===0) return alert("請勾選！"); fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "batchDeleteOrders", orderIds: Array.from(chks).map(c=>c.value) }) }).then(r=>r.json()).then(res=>{ alert(res.message); loadOrdersData(); }); }
    function switchTab(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); if(id === 'listTab') loadInventoryData(); if(id === 'orderTab') loadOrdersData(); }
  </script>
</body>
</html>

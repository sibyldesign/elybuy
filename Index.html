<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>伊利小編購 | 官方行動商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cream-bg': '#FFFFFF', 
            'warm-taupe': '#8C857B',
            'taupe-dark': '#6E675F',
            'carbon-black': '#3A3530',
            'misty-rose': '#D4B2A7',
            'border-soft': '#EAE6DF',
            'sibyl-gold': '#bca085'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FFFFFF; color: #3A3530; -webkit-tap-highlight-color: transparent; font-size: 17px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.25s; }
    .dot.active { background: #FFFFFF; width: 18px; border-radius: 4px; }
    
    /* 電腦版分類置中，手機版橫向滑動 */
    @media (min-width: 768px) {
      #categoryTabs { justify-content: center; flex-wrap: wrap; }
    }
    
    /* 霓虹漸層行銷跑馬燈特效 */
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 12s linear infinite; }
  </style>
</head>
<body class="font-sans antialiased pb-32 bg-white">

<div class="w-full flex justify-end gap-2 px-4 pt-4 pb-2 z-50 bg-white">
  <a href="https://lin.ee/925zrjur" target="_blank" class="bg-white border border-border-soft text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">LINE 客服</a>
  <a href="https://line.me/ti/g2/LOmembwBbeqIpXoFcYG6yX8pCGrIvkPbnNpIig?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="bg-white border border-border-soft text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">加入 LINE 社群</a>
</div>

<div class="flex flex-col items-center text-center px-4 py-3 bg-white">
  <div class="w-[140px] h-[140px] rounded-full border border-border-soft shadow-md overflow-hidden bg-white mb-3 cursor-pointer" onclick="backToHome()">
    <img src="https://i.postimg.cc/x887dL6Q/line-oa-chat-260617-163106.jpg" class="w-full h-full object-cover" alt="Store Logo">
  </div>
  <h1 class="text-2xl font-bold tracking-[3px] text-carbon-black uppercase cursor-pointer" onclick="backToHome()">伊利小編購</h1>
</div>

<div class="mx-4 my-2 bg-gradient-to-r from-red-50 to-amber-50 border border-red-200 rounded-xl p-3 overflow-hidden hidden" id="marketingPromoBox">
  <div class="w-full overflow-hidden">
    <span class="text-base font-bold text-red-600 animate-marquee" id="promoTextSpan"></span>
  </div>
</div>

<div class="mx-4 my-2 bg-white border border-border-soft rounded-xl p-4 text-sm text-center leading-relaxed shadow-sm text-stone-600 font-medium" id="announcement">
  載入中...
</div>

<div class="px-4 py-2 space-y-2 bg-white">
  <div class="bg-white border border-border-soft rounded-xl p-2 flex items-center shadow-sm gap-2">
    <input type="text" id="searchInput" class="bg-transparent pl-2 pr-1 py-2 text-sm outline-none flex-1 text-carbon-black font-medium" placeholder="輸入品名貨號搜尋商品，或輸入電話號碼快查訂單進度與收藏...">
    <button onclick="searchProducts()" class="bg-warm-taupe text-white text-xs font-bold w-12 h-10 py-1 rounded-lg leading-tight shrink-0 flex items-center justify-center text-center">搜尋<br>商品</button>
    <button onclick="checkOrderHistory()" class="bg-misty-rose text-white text-xs font-bold w-12 h-10 py-1 rounded-lg leading-tight shrink-0 flex items-center justify-center text-center">狀態<br>查詢</button>
  </div>

  <div id="queryResultArea" class="bg-white border border-border-soft rounded-xl p-4 shadow-md hidden">
    <div class="flex justify-between items-center mb-2 border-b pb-2">
      <h4 class="text-sm font-bold text-warm-taupe tracking-wide">📋 訂單狀態與收藏清單</h4>
      <span onclick="closeQueryPanel()" class="text-stone-400 font-bold text-2xl cursor-pointer px-1">×</span>
    </div>
    <div id="memberFavoritesContainer" class="mb-3 p-3 bg-rose-50/60 border border-rose-100 rounded-lg text-xs text-rose-900 font-medium hidden"></div>
    <div id="multiOrdersContainer" class="space-y-3 max-h-60 overflow-y-auto divide-y divide-stone-100"></div>
  </div>
</div>

<div class="overflow-x-auto no-scrollbar flex gap-2 px-4 py-2 bg-white text-base font-bold" id="categoryTabs">
  <button class="bg-warm-taupe text-white px-4 py-2 rounded-full whitespace-nowrap shadow-sm m-1">全部商品</button>
</div>

<div class="grid grid-cols-2 gap-3 px-4 py-3 bg-white" id="catalog"></div>

<div class="fixed right-4 bottom-6 flex flex-col gap-2.5 items-end z-[2500]">
  <button id="backToTopBtn" onclick="scrollToTop()" class="w-11 h-11 bg-white text-warm-taupe border border-border-soft rounded-full font-bold text-xl shadow-md hidden items-center justify-center transition-all hover:bg-stone-100">↑</button>
  <button id="viewCartBtn" onclick="toggleCart(true)" class="bg-warm-taupe text-white text-sm font-bold px-5 py-4 rounded-full shadow-lg hidden">購物車 (0)</button>
</div>

<div id="customAlertModal" class="fixed inset-0 bg-black/40 backdrop-blur-[1px] hidden z-[5000] items-center justify-center p-4">
  <div class="bg-white w-full max-w-xs rounded-xl p-5 shadow-xl text-center space-y-3">
    <div id="customAlertText" class="text-sm font-bold text-stone-700 leading-relaxed"></div>
    <button onclick="closeCustomAlert()" class="bg-warm-taupe text-white text-sm px-5 py-2 rounded-lg font-medium w-full shadow">確 定</button>
  </div>
</div>

<div id="itemModal" class="fixed inset-0 bg-black/60 backdrop-blur-[2px] hidden z-[3000] items-end sm:items-center justify-center p-0">
  <div class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl overflow-hidden shadow-2xl relative max-h-[92vh] overflow-y-auto flex flex-col">
    <span onclick="closeModal()" class="fixed sm:absolute right-4 top-4 w-9 h-9 rounded-full bg-white/95 border border-stone-300 text-stone-600 flex items-center justify-center font-bold text-lg cursor-pointer z-[3200] shadow-md">✕</span>

    <div class="w-full aspect-square bg-stone-100 relative overflow-hidden group" id="swiperArea">
      <button onclick="changeImg(-1, event)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/30 text-white w-8 h-8 rounded-full font-bold text-sm z-30 hidden group-hover:block">❮</button>
      <img id="itemImg" src="" class="w-full h-full object-cover transition-all duration-300">
      <button onclick="changeImg(1, event)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 text-white w-8 h-8 rounded-full font-bold text-sm z-30 hidden group-hover:block">❯</button>
      <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-30" id="dotsContainer"></div>
    </div>

    <div class="p-5 space-y-4 bg-white">
      <div class="flex justify-between items-start">
        <div class="flex-1">
          <h2 id="itemTitle" class="text-base font-bold text-carbon-black leading-relaxed"></h2>
          <p id="itemDesc" class="text-xs text-stone-500 mt-1 whitespace-pre-line leading-relaxed"></p>
        </div>
        <div class="flex flex-col gap-2 ml-2">
          <button id="favProductBtn" onclick="toggleFavorite()" class="bg-stone-100 p-2 rounded-full text-xs hover:bg-stone-200 transition-all">🤍</button>
          <button id="shareProductBtn" onclick="shareProduct()" class="bg-stone-100 p-2 rounded-full text-xs hover:bg-stone-200 transition-all">🔗</button>
        </div>
      </div>

      <div class="flex items-baseline gap-2 border-b pb-2.5">
        <span id="itemPrice" class="text-xl font-bold text-red-600"></span>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div><label class="text-xs font-bold text-stone-400 block mb-1">規格1</label><select id="colorSelect" onchange="syncMatrixPrice()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 text-carbon-black font-medium"></select></div>
        <div><label class="text-xs font-bold text-stone-400 block mb-1">規格2</label><select id="sizeSelect" onchange="syncMatrixPrice()" class="w-full text-sm p-2.5 border rounded-lg bg-stone-50 text-carbon-black font-medium"></select></div>
      </div>

      <div class="flex justify-between items-center bg-stone-50 p-2.5 rounded-lg border">
        <span class="text-sm text-stone-500 font-bold">預訂數量</span>
        <div class="flex items-center gap-3">
          <button onclick="modifyModalQty(-1)" class="w-8 h-8 bg-white rounded border flex items-center justify-center font-bold shadow-sm">-</button>
          <span id="qtyInput" class="text-sm font-bold w-6 text-center">1</span>
          <button onclick="modifyModalQty(1)" class="w-8 h-8 bg-white rounded border flex items-center justify-center font-bold shadow-sm">+</button>
        </div>
      </div>
      <button onclick="addToCart()" class="w-full bg-warm-taupe text-white text-sm font-bold py-3.5 rounded-xl shadow-md">加入購物車</button>
    </div>
  </div>
</div>

<div id="cartDrawer" class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 rounded-t-3xl z-[2800] p-5 translate-y-full transition-transform duration-300 max-h-[92vh] overflow-y-auto shadow-2xl space-y-4">
  <div class="flex justify-between items-center border-b pb-2">
    <h3 class="text-base font-bold text-carbon-black tracking-wide">🛒 購物車明細</h3>
    <span onclick="toggleCart(false)" class="text-stone-400 font-bold text-lg cursor-pointer px-1">✕</span>
  </div>
  <div id="cartList" class="divide-y divide-stone-100 max-h-34 overflow-y-auto"></div>

  <div class="space-y-3 border-t pt-2">
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">配送或自取方式</label>
      <select id="shipSelectDropdown" class="w-full text-sm p-3 border border-stone-400 rounded-lg bg-white font-bold text-stone-900"></select>
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">『預計取貨時間』</label>
      <select id="pickupTimeSelect" class="w-full text-sm p-3 border border-stone-400 rounded-lg bg-white font-bold text-stone-900"></select>
    </div>
  </div>

  <div class="bg-stone-50 p-2.5 rounded-xl border border-stone-200 flex gap-2 items-center">
    <input type="text" id="couponCodeInput" class="text-sm p-2.5 border rounded-lg bg-white flex-1 font-mono uppercase" placeholder="輸入折扣碼">
    <button onclick="applyDiscountCode()" class="bg-carbon-black text-white text-sm px-4 py-2.5 rounded-lg font-medium hover:bg-stone-900 transition-all">應用折抵</button>
  </div>
  <div id="discountMsgBlock" class="text-xs text-green-600 font-bold hidden"></div>

  <div class="bg-stone-50 p-4 border text-sm leading-relaxed text-stone-700 rounded-xl space-y-1">
    <div class="font-bold text-base text-stone-900 mb-1">💰 收款資訊說明</div>
    <div id="paymentConfigText" class="font-medium text-stone-800"></div>
  </div>

  <div class="flex justify-between items-baseline border-t pt-2.5">
    <div id="txtDiscountLabel" class="text-sm text-red-500 font-bold"></div>
    <div class="text-base font-bold text-warm-taupe ml-auto">應付總額：NT$ <span id="grandTotal" class="text-xl">0</span></div>
  </div>

  <div class="border-t border-dashed pt-3 space-y-3">
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">手機號碼 (必填)</label>
      <div class="flex gap-2">
        <input type="tel" id="custPhone" placeholder="請輸入手機號碼" class="text-sm p-3 border border-stone-400 rounded-lg bg-white font-medium text-stone-800 flex-1">
        <button onclick="fetchCustomerHistoryData()" id="btnFetchHistory" class="bg-carbon-black text-white text-xs font-bold px-4 py-2 rounded-lg whitespace-nowrap">帶入資料</button>
      </div>
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">訂購人姓名 (必填)</label>
      <input type="text" id="custName" placeholder="請輸入訂購人姓名" class="text-sm p-3 border border-stone-400 rounded-lg bg-white font-medium text-stone-800 w-full">
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">LINE 暱稱 (必填)</label>
      <input type="text" id="lineName" placeholder="請輸入 LINE 暱稱" class="text-sm p-3 border border-stone-400 rounded-lg bg-white font-medium text-stone-800 w-full">
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">電子郵件</label>
      <input type="email" id="custEmail" placeholder="example@gmail.com" class="text-sm p-3 border border-stone-400 rounded-lg bg-white font-medium text-stone-800 w-full">
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">收貨地址</label>
      <input type="text" id="custAddress" class="w-full text-sm p-3 border border-stone-400 rounded-lg bg-white" placeholder="若需要宅配請填寫完整寄送地址">
    </div>
    <div>
      <label class="text-sm font-bold text-stone-900 block mb-1">備註欄</label>
      <input type="text" id="orderRemark" class="w-full text-sm p-3 border border-stone-400 rounded-lg bg-white" placeholder="如交給管理員">
    </div>
  </div>

  <button onclick="submitFinalOrder()" class="w-full bg-warm-taupe text-white text-base font-bold py-3.5 rounded-xl shadow-md hover:bg-taupe-dark">確認無誤！送出訂單</button>
  
  <div class="text-center pt-2">
    <a href="https://lin.ee/925zrjur" target="_blank" class="text-sm font-bold text-blue-600 underline tracking-wide">如有訂單問題請LINE客服</a>
  </div>
</div>

<div class="mx-4 my-4 space-y-2">
  <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
    <div onclick="toggleNotice('box1')" class="p-3.5 text-xs font-bold text-stone-700 flex justify-between items-center cursor-pointer hover:bg-stone-50 transition-colors">
      <div class="flex items-center gap-2"><span>🛒</span> <span class="tracking-wide">購物須知規範</span></div>
      <svg id="icon_box1" class="w-4 h-4 text-stone-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
    </div>
    <div id="box1" class="text-[11px] text-stone-500 p-4 leading-relaxed border-t bg-stone-50/40 hidden whitespace-pre-line"></div>
  </div>
</div>

<div class="mx-4 my-6">
  <div class="bg-white border border-border-soft rounded-2xl p-6 text-center shadow-sm max-w-xl mx-auto">
    <p class="text-stone-800 font-bold text-sm mb-2.5 tracking-wide">📍 伊利小編購 店面資訊</p>
    <p class="text-stone-600 text-xs mb-2.5">營業時間：平日 16:00 - 20:00</p>
    <p class="text-xs"><a href="https://maps.google.com" target="_blank" class="text-stone-800 font-semibold underline">地點：八德國小斜對面貨櫃市集 (點擊導航)</a></p>
  </div>
  <div class="text-center text-xs text-[#C4A48A] mt-4 tracking-widest uppercase font-bold">
    <a href="https://heysibyl.com" target="_blank" class="hover:underline">Designed by Sibyl | 數位管家</a>
  </div>
</div>

<script>
let MASTER_GAS_URL = "https://script.google.com/macros/s/AKfycbx1M57x0n50mvw2VGlWHvDTcb-RS0BwDQAU8y9ReTSk5Wk6wFH_5GsCS0ToRM7So4OSiQ/exec";
function backToHome(){ window.location.reload(); }

// 完美修好前台天價：在加載商品目錄時，直接從 JSON 多規格特價欄位中挑選最低金額渲染
function renderCatalog(list) {
  const box = document.getElementById('catalog'); box.innerHTML = "";
  let active = list.filter(p => p.status !== '下架');
  if(active.length === 0) { box.innerHTML = "<p class='col-span-2 text-center py-10 text-xs text-stone-400'>目前無上架商品項目</p>"; return; }
  active.forEach((p, i) => {
    let minSpecPrice = p.price;
    if(p.rawSpecsData && p.rawSpecsData.length > 0) {
      let vPrices = p.rawSpecsData.map(v => Number(v.price)).filter(v => v > 0);
      if(vPrices.length > 0) minSpecPrice = Math.min(...vPrices);
    }
    box.innerHTML += `<div onclick="openProduct(${rawData.indexOf(p)})" class="bg-white rounded-xl border border-border-soft overflow-hidden shadow-sm flex flex-col cursor-pointer transition-all active:scale-95"><div class="w-full aspect-square bg-stone-50 relative"><img src="${p.allImagesList[0]}" class="w-full h-full object-cover"></div><div class="p-3 flex flex-col flex-1 justify-between bg-white"><h2 class="text-sm font-bold text-carbon-black line-clamp-2 h-9 leading-tight">${p.name}</h2><div class="flex items-baseline gap-1.5 mt-2"><span class="text-sm font-bold text-warm-taupe">${minSpecPrice} 起</span></div></div></div>`;
  });
}

function checkOrderHistory() {
  let phone = document.getElementById('searchInput').value.trim(); if(!phone) return showCustomAlert("請先輸入您的手機號碼！");
  const container = document.getElementById('multiOrdersContainer'); const favContainer = document.getElementById('memberFavoritesContainer');
  container.innerHTML = "<span class='text-xs text-stone-400 animate-pulse'>正在為您同步資料庫進度...</span>"; favContainer.classList.add('hidden'); document.getElementById('queryResultArea').classList.remove('hidden');

  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "queryOrder", phone: phone }) }).then(r => r.json()).then(res => {
    if(res.success && res.favList && res.favList.length > 0) {
      // 快速查詢狀態後，能夠正確渲染出「收藏清單」
      favContainer.innerHTML = `⭐ <b>您的雲端收藏清單：</b><br><span class="font-bold text-rose-600 tracking-wide">${res.favsHtml}</span>`; favContainer.classList.remove('hidden');
    } else { favContainer.innerHTML = "⭐ <b>您的雲端收藏清單：</b><br><span class='text-stone-400'>暫無雲端收藏商品</span>"; favContainer.classList.remove('hidden'); }
    if(!res.success || !res.allOrders || res.allOrders.length === 0) { container.innerHTML = "<p class='text-xs text-stone-400 py-2'>目前查無任何預訂進度，請核對號碼。</p>"; return; }
    container.innerHTML = "";
    res.allOrders.forEach(o => { container.innerHTML += `<div class="py-2.5 text-xs text-stone-700 bg-white"><div class="flex justify-between"><b>單號: ${o.orderId}</b> <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded font-bold">${o.status}</span></div><div class="text-stone-400 mt-1">${o.items.join('<br>')}</div><div class="text-stone-500 mt-1">🚚 配送自取: ${o.shipping}</div><div class="text-[11px] text-warm-taupe">到貨日期：<span class="font-bold text-amber-700">${o.arrivalDate || "追加中"}</span></div></div>`; });
  });
}

function fetchCustomerHistoryData() {
  let phone = document.getElementById('custPhone').value.trim(); if(!phone) return showCustomAlert("請先填寫手機號碼再點擊帶入資料！");
  let btn = document.getElementById('btnFetchHistory'); btn.innerText = "讀取中..."; btn.disabled = true;
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getCustomerHistory", phone: phone }) }).then(r => r.json()).then(res => { btn.innerText = "帶入資料"; btn.disabled = false; if (res && res.success && res.data) { document.getElementById('custName').value = res.data.custName || ""; document.getElementById('lineName').value = res.data.lineName || ""; document.getElementById('custEmail').value = res.data.email || ""; document.getElementById('custAddress').value = res.data.address || ""; document.getElementById('orderRemark').value = res.data.remark || ""; showCustomAlert("🎉 歷史資料已成功自動填入！"); } else { showCustomAlert("無過往訂購紀錄。"); } }).catch(() => { btn.innerText = "帶入資料"; btn.disabled = false; });
}

function submitFinalOrder() {
  let ph = document.getElementById('custPhone').value.trim(), name = document.getElementById('custName').value.trim(), line = document.getElementById('lineName').value.trim();
  if(!ph || !name || !line) return showCustomAlert("姓名、電話、LINE 暱稱為必填項目！");
  if(cart.length === 0) return showCustomAlert("購物車目前無任何品項。");
  showCustomAlert("訂單成立中"); // 簡化提示文字

  let payload = { cartData: cart, userInfo: { phone: ph, name: name, lineName: line, email: document.getElementById('custEmail').value.trim(), shipping: document.getElementById('shipSelectDropdown').value, address: document.getElementById('pickupTimeSelect').value, grandTotal: document.getElementById('grandTotal').innerText, shipName: document.getElementById('custAddress').value.trim() || "現場自取", remark: document.getElementById('orderRemark').value.trim() || "無", couponUsed: activatedCouponName } };
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "processOrder", cartData: cart, userInfo: payload.userInfo }) }).then(r => r.json()).then(res => {
    if(res.success) {
      closeCustomAlert();
      setTimeout(() => {
        // 下單成功後的精確字句回填
        showCustomAlert("下單完成！明細已發送至您的Mail信箱。也可輸入電話查詢狀態！\n訂單編號：" + res.orderId);
        cart = []; currentDiscountValue = 0; activatedCouponName = ""; document.getElementById('couponCodeInput').value = ""; document.getElementById('discountMsgBlock').classList.add('hidden'); document.getElementById('txtDiscountLabel').innerText = ""; updateCartUI(); toggleCart(false);
      }, 300);
    }
  });
}
</script>
</body>
</html>

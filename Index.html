        extend: {

            'taupe-dark': '#6E675F',

    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.25s; }
    .dot.active { background: #FFFFFF; width: 18px; border-radius: 4px; }
    
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

<script>
let globalFetchLock = false;
function openProduct(idx) {
  selectedIdx = idx; const p = rawData[idx];
  document.getElementById('qtyInput').innerText = "1"; imgIdx = 0; curImgs = [...p.allImagesList]; activeSpecsPriceMap = {};
  if(p.rawSpecsData) { p.rawSpecsData.forEach(sp => { activeSpecsPriceMap[sp.spec] = sp.price; }); }
  buildDotsProgressBar(); showMediaImage();
  document.getElementById('itemTitle').innerText = p.name;
  document.getElementById('itemDesc').innerText = p.desc || "";

  // 配置背景模糊圖片
  document.getElementById('itemImgBlurBg').style.backgroundImage = `url('${curImgs[0]}')`;

  const cSel = document.getElementById('colorSelect'); cSel.innerHTML = "";
  p.colors.forEach(c => { cSel.innerHTML += `<option value="${c.trim()}">${c.trim()}</option>`; });
  const sSel = document.getElementById('sizeSelect'); sSel.innerHTML = "";
  p.sizes.forEach(s => { sSel.innerHTML += `<option value="${s.trim()}">${s.trim()}</option>`; });

  let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]');
  document.getElementById('favProductBtn').innerText = favs.includes(p.sku) ? "❤️ 已收藏" : "🤍 收藏";
  syncMatrixPrice();
  document.getElementById('itemModal').className = "fixed inset-0 bg-black/60 backdrop-blur-[2px] flex z-[3000] items-end sm:items-center justify-center p-0";
}

function updateCartUI() {
  const box = document.getElementById('cartList'); box.innerHTML = ""; let subtotal = 0;
  cart.forEach((item, idx) => {
    subtotal += item.price * item.qty;
    box.innerHTML += `
    <div class="py-3 text-base border-b bg-white flex justify-between items-start">
      <div class="space-y-1 flex-1 pr-2">
        <div class="font-bold text-stone-900 text-base leading-tight">${item.prodName}</div>
        <div class="text-stone-400 text-xs font-medium">${item.color} / ${item.size} × ${item.qty}</div>
        <div class="text-sm font-bold text-amber-800 pt-0.5">小計金額：NT$ ${item.price * item.qty}</div>
      </div>
      <span onclick="removeCart(${idx})" class="text-stone-300 text-lg font-bold px-1 cursor-pointer hover:text-red-500">✕</span>
    </div>`;
  });
  let finalTotal = subtotal - currentDiscountValue; if(finalTotal < 0) finalTotal = 0;
  document.getElementById('grandTotal').innerText = finalTotal;
  const btn = document.getElementById('viewCartBtn'); btn.className = cart.length > 0 ? "bg-[#D4B2A7] text-white text-sm font-bold px-5 py-4 rounded-full shadow-lg fixed right-4 bottom-6 z-50 flex" : "hidden"; btn.innerText = `購物車 (${cart.length})`;
}

function fetchCustomerHistoryData() {
  if(globalFetchLock) return;
  let phone = document.getElementById('custPhone').value.trim(); if(!phone) return showCustomAlert("請先填寫手機號碼再點擊帶入資料！");
  let btn = document.getElementById('btnFetchHistory'); btn.innerText = "請稍候..."; btn.disabled = true; globalFetchLock = true;
  
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getCustomerHistory", phone: phone }) })
  .then(r => r.json()).then(res => {
    btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false;
    if (res && res.success && res.data) {
      document.getElementById('custName').value = res.data.custName || "";
      document.getElementById('lineName').value = res.data.lineName || "";
      document.getElementById('custEmail').value = res.data.email || "";
      document.getElementById('custAddress').value = res.data.address || "";
      document.getElementById('orderRemark').value = res.data.remark || "";
      showCustomAlert("🎉 歷史資料已成功自動填入！");
    } else { showCustomAlert("查無過往訂購紀錄。"); }
  }).catch(() => { btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false; });
}

function searchProducts() {
  let kw = document.getElementById('searchInput').value.trim(); if(!kw) return showCustomAlert("請輸入欲搜尋的關鍵字！");
  products = rawData.filter(p => p.sku.toLowerCase().includes(kw.toLowerCase()) || p.name.toLowerCase().includes(kw.toLowerCase()));
  renderCatalog(products);
}

function checkOrderHistory() {
  let phone = document.getElementById('searchInput').value.trim(); if(!phone) return showCustomAlert("請先輸入您的手機號碼！");
  const container = document.getElementById('multiOrdersContainer'); const favContainer = document.getElementById('memberFavoritesContainer');
  container.innerHTML = "<span class='text-xs text-stone-400 animate-pulse'>正在為您同步資料庫進度...</span>"; favContainer.classList.add('hidden'); document.getElementById('queryResultArea').classList.remove('hidden');

  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "queryOrder", phone: phone }) }).then(r => r.json()).then(res => {
    if(res.success && res.favList && res.favList.length > 0) {
      let cardsHtml = `<div class="font-bold text-stone-800 mb-2 border-b pb-1 text-xs">⭐ 您的專屬雲端收藏清單</div><div class="grid grid-cols-1 gap-2">`;
      res.favList.forEach(sku => {
        let matchProd = rawData.find(x => x.sku === sku);
        if(matchProd) {
          cardsHtml += `<div class="flex items-center gap-2 bg-cream-bg border p-1.5 rounded-lg shadow-sm cursor-pointer" onclick="openProduct(${rawData.indexOf(matchProd)})"><img src="${matchProd.allImagesList[0]}" class="w-10 h-10 object-cover rounded"><div class="flex-1 min-w-0"><div class="text-xs font-bold text-stone-800 truncate">${matchProd.name}</div><div class="text-[11px] text-warm-taupe font-mono">${sku}</div></div></div>`;
        } else { cardsHtml += `<div class="bg-stone-50 border p-2 rounded-lg text-xs font-mono text-stone-500">🔍 貨號：${sku}</div>`; }
      });
      cardsHtml += `</div>`; favContainer.innerHTML = cardsHtml; favContainer.classList.remove('hidden');
    } else { favContainer.innerHTML = "⭐ <b>您的專屬雲端收藏清單：</b><br><span class='text-stone-400 font-medium'>暫無雲端收藏商品</span>"; favContainer.classList.remove('hidden'); }
    if(!res.success || !res.allOrders || res.allOrders.length === 0) { container.innerHTML = "<p class='text-xs text-stone-400 py-2'>目前查無任何預訂進度，請核對號碼。</p>"; return; }
    container.innerHTML = "";
    res.allOrders.forEach(o => { container.innerHTML += `<div class="py-2.5 text-xs text-stone-700 bg-white"><div class="flex justify-between"><b>單號: ${o.orderId}</b> <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded font-bold">${o.status}</span></div><div class="text-stone-400 mt-1">${o.items.join('<br>')}</div><div class="text-stone-500 mt-1">🚚 配送自取: ${o.shipping}</div><div class="text-[11px] text-warm-taupe">到貨日期：<span class="font-bold text-amber-700">${o.arrivalDate || "追加中"}</span></div></div>`; });
  });
}
</script>
</body>
</html>

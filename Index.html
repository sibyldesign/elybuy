<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cream-bg': '#FFFFFF', 
            'warm-taupe': '#8C857B',
            'taupe-dark': '#6E675F',
            'carbon-black': '#3A3530',
            'misty-rose': '#D4B2A7',
            'border-soft': '#EAE6DF',
            'sibyl-gold': '#bca085'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FFFFFF; color: #3A3530; -webkit-tap-highlight-color: transparent; font-size: 17px; overflow-x: hidden; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.25s; }
    .dot.active { background: #FFFFFF; width: 18px; border-radius: 4px; }
    
    /* 霓虹漸層跑馬燈與行銷閃爍特效 */
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    @keyframes blink-ui { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
    .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 14s linear infinite; }
    .promo-flash { animation: blink-ui 2s infinite ease-in-out; }
    
    /* 電腦版分類列置中，手機版維持橫向滑動 */
    @media (min-width: 768px) {
      #categoryTabs { justify-content: center; flex-wrap: wrap; }
    }
  </style>
</head>

    <a href="https://lin.ee/vWmWpyT" target="_blank" class="bg-white border border-border-soft text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">LINE 客服</a>
    <a href="https://line.me/ti/g2/LOmembwBbeqIpXoFcYG6yX8pCGrIvkPbnNpIig?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="bg-white border border-border-soft text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">加入 LINE 社群</a>
  </div>

  <div class="flex flex-col items-center text-center px-4 py-3 bg-white">

    載入中...
  </div>

  <div class="px-4 py-2 space-y-2 bg-white">
    <div class="bg-white border border-border-soft rounded-xl p-2 flex items-center shadow-sm gap-2 max-w-full overflow-hidden">

    </div>

  <div class="mx-4 my-4 space-y-2">

      </div>
      <div id="box1" class="text-xs text-stone-500 p-4 leading-relaxed border-t bg-stone-50/40 hidden whitespace-pre-line"></div>
    </div>
    <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
      <div onclick="toggleNotice('box2')" class="p-3.5 text-sm font-bold text-stone-700 flex justify-between items-center cursor-pointer hover:bg-stone-50 transition-colors">
        <div class="flex items-center gap-2"><span>📦</span> <span class="tracking-wide">退換貨須知處理</span></div>
        <svg id="icon_box2" class="w-4 h-4 text-stone-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
      <div id="box2" class="text-xs text-stone-500 p-4 leading-relaxed border-t bg-stone-50/40 hidden whitespace-pre-line"></div>
    </div>
    <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
      <div onclick="toggleNotice('box3')" class="p-3.5 text-sm font-bold text-stone-700 flex justify-between items-center cursor-pointer hover:bg-stone-50 transition-colors">
        <div class="flex items-center gap-2"><span>🔒</span> <span class="tracking-wide">隱私權保護政策</span></div>
        <svg id="icon_box3" class="w-4 h-4 text-stone-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
      <div id="box3" class="text-xs text-stone-500 p-4 leading-relaxed border-t bg-stone-50/40 hidden whitespace-pre-line"></div>

  <div class="mx-4 my-6">
    <div class="bg-white border border-border-soft rounded-2xl p-6 text-center shadow-sm max-w-xl mx-auto">
      <p class="text-stone-800 font-bold text-sm mb-2.5 tracking-wide">📍 伊利小編購 店面資訊</p>
      <p class="text-stone-600 text-xs mb-2.5">營業時間：平日 16:00 - 20:00</p>
      <p class="text-xs"><a href="https://maps.google.com" target="_blank" class="text-stone-800 font-semibold underline">地點：八德國小斜對面貨櫃市集 (點擊導航)</a></p>
    </div>
    <div class="text-center text-xs text-[#C4A48A] mt-4 tracking-widest uppercase font-bold"><a href="https://heysibyl.com" target="_blank" class="hover:underline">Designed by Sibyl | 數位管家</a></div>

<script>
let MASTER_GAS_URL = "https://script.google.com/macros/s/AKfycbx1M57x0n50mvw2VGlWHvDTcb-RS0BwDQAU8y9ReTSk5Wk6wFH_5GsCS0ToRM7So4OSiQ/exec";
let rawData = [], products = [], cart = [], selectedIdx = -1;
let curImgs = [], imgIdx = 0, currentDiscountValue = 0, activatedCouponName = "";
let touchStartX = 0, touchEndX = 0, activeSpecsPriceMap = {};
let globalFetchLock = false;

function backToHome(){ window.location.reload(); }
function showCustomAlert(msg) { document.getElementById('customAlertText').innerText = msg; document.getElementById('customAlertModal').className = "fixed inset-0 bg-black/40 backdrop-blur-[1px] flex z-[5000] items-center justify-center p-4"; }
function closeCustomAlert() { document.getElementById('customAlertModal').className = "hidden"; }

window.onscroll = function() {
  let topBtn = document.getElementById("backToTopBtn");
  if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) { topBtn.classList.remove('hidden'); }
  else { topBtn.classList.add('hidden'); }
};
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function toggleNotice(id) { let el = document.getElementById(id); el.classList.toggle('hidden'); document.getElementById('icon_'+id).style.transform = el.classList.contains('hidden') ? "rotate(0deg)" : "rotate(180deg)"; }
function closeQueryPanel() { document.getElementById('queryResultArea').classList.add('hidden'); }

// 🚀 核心大改版：配送與自取前端連動互鎖機制
function handleShipModeChange() {
  let shipMode = document.getElementById('shipSelectDropdown').value;
  let timeBlock = document.getElementById('pickupTimeBlock');
  let addressBlock = document.getElementById('shippingAddressBlock');
  
  if (shipMode.includes("來店取貨") || shipMode.includes("自取")) {
    timeBlock.classList.remove('hidden');
    addressBlock.classList.add('hidden');
    document.getElementById('custAddress').value = ""; // 清空，不開放給來店取貨
  } else {
    timeBlock.classList.add('hidden');
    addressBlock.classList.remove('hidden');
    document.getElementById('pickupTimeSelect').value = ""; // 清空，不開放給配送到府
  }
}

window.onload = () => {
  const swiper = document.getElementById('swiperArea');
  swiper.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
  swiper.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipeGesture(); }, false);

  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getStoreData" }) })
  .then(r => r.json()).then(res => {
    if(!res || !res.success) return;
    document.getElementById('announcement').innerText = res.config.announcement;
    document.getElementById('paymentConfigText').innerText = res.config.payInfo || "現場付現";
    document.getElementById('box1').innerText = res.shopNotice;
    document.getElementById('box2').innerText = res.refundNotice;
    document.getElementById('box3').innerText = res.privacyPolicy;

    // 🚀 試算表 100% 控制行銷跑馬燈文字
    if(res.promoText && res.promoText !== "暫無特定行銷活動") {
      let pBox = document.getElementById('marketingPromoBox');
      let span = document.getElementById('promoTextSpan');
      span.innerText = res.promoText; 
      pBox.classList.remove('hidden');
    }

    const pTime = document.getElementById('pickupTimeSelect'); pTime.innerHTML = "";
    res.config.timeOptions.forEach(t => { pTime.innerHTML += `<option value="${t}">${t}</option>`; });

    const pShip = document.getElementById('shipSelectDropdown'); pShip.innerHTML = "";
    if(res.shipModes) res.shipModes.split(',').forEach(m => { pShip.innerHTML += `<option value="${m.trim()}">${m.trim()}</option>`; });

    // 初始化配送互鎖狀態
    handleShipModeChange();

    rawData = res.products.map(p => {
      let specs = [];
      try { specs = p.specsData ? JSON.parse(p.specsData) : []; } catch(e){}
      
      let finalMinPrice = 0;
      if (specs && specs.length > 0) {
        let parsedPrices = specs.map(v => Number(v.price)).filter(v => v > 0);
        if (parsedPrices.length > 0) finalMinPrice = Math.min(...parsedPrices);
      }
      if (!finalMinPrice || finalMinPrice === 0) {
        let pricesArray = p.price ? p.price.toString().split(',').map(num => Number(num.replace(/[^0-9]/g, ""))) : [0];
        finalMinPrice = Math.min(...pricesArray);
      }
      let fallbackUrl = "https://i.postimg.cc/x887dL6Q/line-oa-chat-260617-163106.jpg";
      return {
        sku: p.sku, name: p.name, status: p.status, category: p.major, sub: p.sub, tag: p.tag, desc: p.desc, arrivalDate: p.arrivalDate || "追加中",
        allImagesList: p.allImgs && p.allImgs.length > 0 && p.allImgs[0] !== "" ? p.allImgs : [fallbackUrl],
        price: finalMinPrice,
        rawSpecsData: specs,
        colors: p.color ? p.color.split(',') : ["通用規格"],
        sizes: p.size ? p.size.split(',') : ["標準尺寸"]
      };
    });
    products = rawData; setupCategoryTabs(res.majorCategories); renderCatalog(products);
  });
};

function setupCategoryTabs(cats) {
  const box = document.getElementById('categoryTabs');
  box.innerHTML = `<button id="tab-all" onclick="filterCat('all')" class="cat-tab-btn bg-warm-taupe text-white text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm m-1 transition-all">全部商品</button>`;
  cats.forEach(c => {
    if(c) box.innerHTML += `<button id="tab-${c.trim()}" onclick="filterCat('${c.trim()}')" class="cat-tab-btn bg-white border border-border-soft text-carbon-black text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all">${c.trim()}</button>`;
  });
  box.innerHTML += `<button id="tab-fav" onclick="filterFavoritesOnly()" class="cat-tab-btn bg-white border border-rose-200 text-rose-500 text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all">💖 我的收藏</button>`;
}

function filterCat(c) {
  document.querySelectorAll('.cat-tab-btn').forEach(b => { b.className = "cat-tab-btn bg-white border border-border-soft text-carbon-black text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all"; });
  if(c === 'all') {
    document.getElementById('tab-all').className = "cat-tab-btn bg-warm-taupe text-white text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm m-1 transition-all";
    products = rawData;
  } else {
    document.getElementById('tab-' + c).className = "cat-tab-btn bg-warm-taupe text-white text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm m-1 transition-all";
    products = rawData.filter(x => x.category === c);
  }
  renderCatalog(products);
}

function filterFavoritesOnly() {
  document.querySelectorAll('.cat-tab-btn').forEach(b => { b.className = "cat-tab-btn bg-white border border-border-soft text-carbon-black text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all"; });
  document.getElementById('tab-fav').className = "cat-tab-btn bg-warm-taupe text-white text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm m-1 transition-all";
  let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]');
  products = rawData.filter(p => favs.includes(p.sku));
  renderCatalog(products);
}

function renderCatalog(list) {
  const box = document.getElementById('catalog'); box.innerHTML = "";
  let active = list.filter(p => p.status !== '下架');
  if(active.length === 0) { box.innerHTML = "<p class='col-span-2 text-center py-10 text-xs text-stone-400'>目前無符合條件之商品項目</p>"; return; }
  active.forEach((p, i) => {
    box.innerHTML += `<div onclick="openProduct(${rawData.indexOf(p)})" class="bg-white rounded-xl border border-border-soft overflow-hidden shadow-sm flex flex-col cursor-pointer transition-all active:scale-95"><div class="w-full aspect-square bg-stone-50 relative"><img src="${p.allImagesList[0]}" class="w-full h-full object-cover"></div><div class="p-3 flex flex-col flex-1 justify-between bg-white"><h2 class="text-sm font-bold text-carbon-black line-clamp-2 h-9 leading-tight">${p.name}</h2><div class="flex items-baseline gap-1.5 mt-2"><span class="text-sm font-bold text-warm-taupe">NT$ ${p.price} 起</span></div></div></div>`;
  });
}

function openProduct(idx) {
  selectedIdx = idx; const p = rawData[idx];
  document.getElementById('qtyInput').innerText = "1"; imgIdx = 0; curImgs = [...p.allImagesList]; activeSpecsPriceMap = {};
  if(p.rawSpecsData) { p.rawSpecsData.forEach(sp => { activeSpecsPriceMap[sp.spec] = sp.price; }); }
  buildDotsProgressBar(); showMediaImage();
  document.getElementById('itemTitle').innerText = p.name;
  
  document.getElementById('itemTagContainer').innerText = p.tag ? `🏷️ ${p.tag}` : "今日推薦";
  
  // 🚀 格式化到貨日期防止長英文物件英文字串錯位
  let formattedShowDate = p.arrivalDate || "追加中";
  if(formattedShowDate.includes("GMT") || formattedShowDate.includes("台北標準時間")) {
    let d = new Date(formattedShowDate);
    if(!isNaN(d.getTime())) formattedShowDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('itemArrivalDateContainer').innerText = `📅 到貨日期：${formattedShowDate}`;
  document.getElementById('itemDesc').innerText = p.desc || "";
  document.getElementById('itemImgBlurBg').style.backgroundImage = `url('${curImgs[0]}')`;

  const cSel = document.getElementById('colorSelect'); cSel.innerHTML = "";
  p.colors.forEach(c => { cSel.innerHTML += `<option value="${c.trim()}">${c.trim()}</option>`; });
  const sSel = document.getElementById('sizeSelect'); sSel.innerHTML = "";
  p.sizes.forEach(s => { sSel.innerHTML += `<option value="${s.trim()}">${s.trim()}</option>`; });

  let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]');
  document.getElementById('favProductBtn').innerText = favs.includes(p.sku) ? "❤️ 已收藏" : "🤍 收藏";
  syncMatrixPrice();
  document.getElementById('itemModal').className = "fixed inset-0 bg-black/60 backdrop-blur-[2px] flex z-[3000] items-end sm:items-center justify-center p-0";
}

function syncMatrixPrice() {
  const p = rawData[selectedIdx]; const c = document.getElementById('colorSelect').value; const s = document.getElementById('sizeSelect').value;
  let targetKey = `款式:${c} / ${s}`; let matchedPrice = activeSpecsPriceMap[targetKey];
  if (matchedPrice) {
    document.getElementById('itemPrice').innerHTML = `<span class="text-red-600 font-bold text-xl">NT$ ${matchedPrice}</span>`;
  } else {
    document.getElementById('itemPrice').innerHTML = `<span class="text-red-600 font-bold text-xl">NT$ ${p.price} 起</span>`;
  }
}

function buildDotsProgressBar() { const container = document.getElementById('dotsContainer'); container.innerHTML = ""; if (curImgs.length <= 1) return; curImgs.forEach((_, i) => { container.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="imgIdx=${i};showMediaImage();event.stopPropagation();"></div>`; }); }
function showMediaImage() { document.getElementById('itemImg').src = curImgs[imgIdx]; let dots = document.querySelectorAll('#dotsContainer .dot'); dots.forEach((d, i) => { if(i === imgIdx) d.classList.add('active'); else d.classList.remove('active'); }); }
function changeImg(dir, e) { if(e) e.stopPropagation(); imgIdx = (imgIdx + dir + curImgs.length) % curImgs.length; showMediaImage(); }
function handleSwipeGesture() { if (touchStartX - touchEndX > 40) changeImg(1); if (touchEndX - touchStartX > 40) changeImg(-1); }
function closeModal() { document.getElementById('itemModal').className = "hidden"; }
function modifyModalQty(amt) { let q = parseInt(document.getElementById('qtyInput').innerText) + amt; if(q < 1) q = 1; document.getElementById('qtyInput').innerText = q; }

function toggleFavorite() {
  const p = rawData[selectedIdx]; let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]'); let fIdx = favs.indexOf(p.sku);
  if(fIdx !== -1) { favs.splice(fIdx, 1); showCustomAlert("已移出您的收藏庫"); }
  else { favs.push(p.sku); showCustomAlert("成功加入您的雲端收藏庫！"); }
  localStorage.setItem('yl_favs', JSON.stringify(favs));
  document.getElementById('favProductBtn').innerText = favs.includes(p.sku) ? "❤️ 已收藏" : "🤍 收藏";
  let ph = document.getElementById('custPhone').value.trim();
  if(ph) fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "handleSyncFavorites", phone: ph, favorites: favs }) });
}

function shareProduct() { 
  let p = rawData[selectedIdx]; 
  // 🚀 修正：正確 GitHub 網址正式環境自動拼接
  let baseDomain = window.location.hostname.includes('github.io') 
    ? window.location.origin + window.location.pathname 
    : "https://sibyldesign.github.io/yili-select/Index.html";
    
  navigator.clipboard.writeText(baseDomain + "?sku=" + p.sku); 
  showCustomAlert("🔗 分享連結已複製到您的剪貼簿！"); 
}

function addToCart() {
  const p = rawData[selectedIdx]; const c = document.getElementById('colorSelect').value; const s = document.getElementById('sizeSelect').value;
  let finalUnitPrice = activeSpecsPriceMap[`款式:${c} / ${s}`] || p.price;
  cart.push({ sku: p.sku, prodName: p.name, color: c, size: s, price: Number(finalUnitPrice), qty: parseInt(document.getElementById('qtyInput').innerText), arrivalDate: p.arrivalDate || "追加中" });
  closeModal(); updateCartUI();
}
function removeCart(idx) { cart.splice(idx,1); updateCartUI(); }
function toggleCart(show) { document.getElementById('cartDrawer').style.transform = show ? "translateY(0)" : "translateY(100%)"; }

function updateCartUI() {
  const box = document.getElementById('cartList'); box.innerHTML = ""; let subtotal = 0;
  cart.forEach((item, idx) => {
    subtotal += item.price * item.qty;
    box.innerHTML += `
    <div class="py-3 text-base border-b bg-white flex justify-between items-start">
      <div class="space-y-1 flex-1 pr-2">
        <div class="font-bold text-stone-900 text-base leading-tight">${item.prodName}</div>
        <div class="text-stone-400 text-xs font-medium">${item.color} / ${item.size} × ${item.qty}</div>
        <div class="text-sm font-bold text-amber-800 pt-0.5">小計金額：NT$ ${item.price * item.qty}</div>
      </div>
      <span onclick="removeCart(${idx})" class="text-stone-300 text-lg font-bold px-1 cursor-pointer hover:text-red-500">✕</span>
    </div>`;
  });
  let finalTotal = subtotal - currentDiscountValue; if(finalTotal < 0) finalTotal = 0;
  document.getElementById('grandTotal').innerText = finalTotal;
  const btn = document.getElementById('viewCartBtn'); btn.className = cart.length > 0 ? "bg-[#D4B2A7] text-white text-sm font-bold px-5 py-4 rounded-full shadow-lg fixed right-4 bottom-6 z-50 flex" : "hidden"; btn.innerText = `購物車 (${cart.length})`;
}

function applyDiscountCode() {
  let code = document.getElementById('couponCodeInput').value.trim(); if(!code) return showCustomAlert("請輸入折扣碼！");
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "checkCouponCode", code: code }) }).then(r => r.json()).then(res => { if(res.success && res.match) { currentDiscountValue = Number(res.discount); activatedCouponName = code; document.getElementById('discountMsgBlock').innerText = `🎉 已折抵 NT$ ${currentDiscountValue} 元`; document.getElementById('discountMsgBlock').classList.remove('hidden'); document.getElementById('txtDiscountLabel').innerText = `已扣除：-$${currentDiscountValue}`; updateCartUI(); } else { showCustomAlert("折扣碼無效！"); } });
}

function searchProducts() {
  let kw = document.getElementById('searchInput').value.trim(); if(!kw) return showCustomAlert("請輸入欲搜尋的關鍵字！");
  products = rawData.filter(p => p.sku.toLowerCase().includes(kw.toLowerCase()) || p.name.toLowerCase().includes(kw.toLowerCase()));
  renderCatalog(products);
}

function checkOrderHistory() {
  let phone = document.getElementById('searchInput').value.trim(); if(!phone) return showCustomAlert("請先輸入您的手機號碼！");
  const container = document.getElementById('multiOrdersContainer'); const favContainer = document.getElementById('memberFavoritesContainer');
  container.innerHTML = "<span class='text-xs text-stone-400 animate-pulse'>正在為您同步資料庫進度...</span>"; if(favContainer) favContainer.classList.add('hidden'); document.getElementById('queryResultArea').classList.remove('hidden');

  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "queryOrder", phone: phone }) }).then(r => r.json()).then(res => {
    if(!res.success || !res.allOrders || res.allOrders.length === 0) { container.innerHTML = "<p class='text-xs text-stone-400 py-2'>目前查無 any 預訂進度，請核對號碼。</p>"; return; }
    container.innerHTML = "";
    res.allOrders.forEach(o => {
      // 🚀 狀態快查日期格式清洗優化防止長英文
      let cleanArrivalDate = o.arrivalDate || "追加中";
      if(cleanArrivalDate && (cleanArrivalDate.includes("GMT") || cleanArrivalDate.includes("台北標準時間"))) {
        let d = new Date(cleanArrivalDate);
        if(!isNaN(d.getTime())) cleanArrivalDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
      container.innerHTML += `<div class="py-2.5 text-xs text-stone-700 bg-white"><div class="flex justify-between"><b>單號: ${o.orderId}</b> <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded font-bold">${o.status}</span></div><div class="text-stone-400 mt-1">${o.items.join('<br>')}</div><div class="text-stone-500 mt-1">🚚 配送自取: ${o.shipping}</div><div class="text-[11px] text-warm-taupe">到貨日期：<span class="font-bold text-amber-700">${cleanArrivalDate}</span></div></div>`;
    });
  });
}

function fetchCustomerHistoryData() {
  if(globalFetchLock) return;
  let phone = document.getElementById('custPhone').value.trim(); if(!phone) return showCustomAlert("請先填寫手機號碼再點擊帶入資料！");
  let btn = document.getElementById('btnFetchHistory'); btn.innerText = "請稍候..."; btn.disabled = true; globalFetchLock = true;
  
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getCustomerHistory", phone: phone }) })
  .then(r => r.json()).then(res => {
    btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false;
    if (res && res.success && res.data) {
      document.getElementById('custName').value = res.data.custName || "";
      document.getElementById('lineName').value = res.data.lineName || "";
      document.getElementById('custEmail').value = res.data.email || "";
      document.getElementById('custAddress').value = res.data.address || "";
      document.getElementById('orderRemark').value = res.data.remark || "";
    } else { showCustomAlert("查無過往訂購紀錄。"); }
  }).catch(() => { btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false; });
}

function submitFinalOrder() {
  let ph = document.getElementById('custPhone'), name = document.getElementById('custName'), line = document.getElementById('lineName'), mail = document.getElementById('custEmail');
  let shipMode = document.getElementById('shipSelectDropdown').value;
  let pickupTime = document.getElementById('pickupTimeSelect').value;
  let custAddress = document.getElementById('custAddress').value.trim();
  let orderRemark = document.getElementById('orderRemark').value.trim();

  // 🚀 防呆必填與滑動聚焦提示
  if(!name.value.trim()){ showCustomAlert("請填寫必填欄位：訂購人姓名！"); name.focus(); name.scrollIntoView({ behavior: 'smooth' }); return; }
  if(!ph.value.trim()){ showCustomAlert("請填寫必填欄位：手機號碼！"); ph.focus(); ph.scrollIntoView({ behavior: 'smooth' }); return; }
  if(!line.value.trim()){ showCustomAlert("請填寫必填欄位：LINE 暱稱！"); line.focus(); line.scrollIntoView({ behavior: 'smooth' }); return; }
  if(!mail.value.trim()){ showCustomAlert("請填寫必填欄位：電子郵件！"); mail.focus(); mail.scrollIntoView({ behavior: 'smooth' }); return; }
  
  // 🚀 配送或自取前端動態強制防呆鎖定互鎖
  let finalTimeField = ""; 
  let finalAddressField = "";

  if (shipMode.includes("來店取貨") || shipMode.includes("自取")) {
    if (!pickupTime) { showCustomAlert("⚠️ 提示：您選擇來店取貨，請務必選取『預計取貨時間』！"); document.getElementById('pickupTimeSelect').scrollIntoView({ behavior: 'smooth' }); return; }
    finalTimeField = pickupTime; 
    finalAddressField = "現場取貨"; 
  } else {
    if (!custAddress) { showCustomAlert("⚠️ 提示：您選擇配送到府，請務必填寫完整的『收貨地址』！"); document.getElementById('custAddress').focus(); document.getElementById('custAddress').scrollIntoView({ behavior: 'smooth' }); return; }
    finalTimeField = "選宅配"; 
    finalAddressField = custAddress; 
  }

  if(cart.length === 0) return showCustomAlert("購物車目前無任何品項。");
  
  showCustomAlert("訂單成立中，請稍候...");
  let payload = { 
    cartData: cart, 
    userInfo: { 
      phone: ph.value.trim(), 
      name: name.value.trim(), 
      lineName: line.value.trim(), 
      email: mail.value.trim(), 
      shipping: shipMode, 
      address: finalTimeField, 
      grandTotal: document.getElementById('grandTotal').innerText, 
      shipName: finalAddressField, 
      remark: orderRemark || "無", 
      couponUsed: activatedCouponName 
    } 
  };
  
  fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "processOrder", cartData: cart, userInfo: payload.userInfo }) }).then(r => r.json()).then(res => {
    if(res.success) {
      closeCustomAlert();
      setTimeout(() => {
        // 🚀 修改提示文字：加入可能去垃圾信件
        showCustomAlert("下單完成！明細已發送至您的Mail信箱(可能去垃圾信件)。\n也可輸入電話查詢狀態！\n訂單編號：" + res.orderId);
        cart = []; currentDiscountValue = 0; activatedCouponName = ""; document.getElementById('couponCodeInput').value = ""; document.getElementById('discountMsgBlock').classList.add('hidden'); document.getElementById('txtDiscountLabel').innerText = ""; updateCartUI(); toggleCart(false);
      }, 300);
    } else {
      // 🚀 修改失敗提示文字
      showCustomAlert("訂單送出失敗，請再次下單或與LINE客服聯絡");
    }
  }).catch(() => { showCustomAlert("網路連線逾時，請再次下單或與LINE客服聯絡"); });
}
</script>
</body>
</html>

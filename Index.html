<script>
let MASTER_GAS_URL = "https://script.google.com/macros/s/AKfycbx1M57x0n50mvw2VGlWHvDTcb-RS0BwDQAU8y9ReTSk5Wk6wFH_5GsCS0ToRM7So4OSiQ/exec";
let rawData = [], products = [], cart = [], selectedIdx = -1;
let curImgs = [], imgIdx = 0, currentDiscountValue = 0, activatedCouponName = "";
let touchStartX = 0, touchEndX = 0, activeSpecsPriceMap = {};
let globalFetchLock = false;

function backToHome(){ window.location.reload(); }
function showCustomAlert(msg) { document.getElementById('customAlertText').innerText = msg; document.getElementById('customAlertModal').className = "fixed inset-0 bg-black/40 backdrop-blur-[1px] flex z-[6000] items-center justify-center p-4"; }
function closeCustomAlert() { document.getElementById('customAlertModal').className = "hidden"; }

window.onscroll = function() {
let topBtn = document.getElementById("backToTopBtn");
if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) { topBtn.classList.remove('hidden'); }
else { topBtn.classList.add('hidden'); }
};
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function toggleNotice(id) { let el = document.getElementById(id); el.classList.toggle('hidden'); document.getElementById('icon_'+id).style.transform = el.classList.contains('hidden') ? "rotate(0deg)" : "rotate(180deg)"; }
function closeQueryPanel() { document.getElementById('queryResultArea').classList.add('hidden'); }

function handleShipModeChange() {
let shipMode = document.getElementById('shipSelectDropdown').value;
let timeBlock = document.getElementById('pickupTimeBlock');
let addressBlock = document.getElementById('shippingAddressBlock');

if (shipMode.includes("來店取貨") || shipMode.includes("自取")) {
timeBlock.classList.remove('hidden');
addressBlock.classList.add('hidden');
document.getElementById('custAddress').value = "";
} else {
timeBlock.classList.add('hidden');
addressBlock.classList.remove('hidden');
document.getElementById('pickupTimeSelect').value = "";
}
}

window.onload = () => {
const swiper = document.getElementById('swiperArea');
swiper.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
swiper.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipeGesture(); }, false);

fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getStoreData" }) })
.then(r => r.json()).then(res => {
if(!res || !res.success) return;
document.getElementById('announcement').innerText = res.config.announcement;
document.getElementById('paymentConfigText').innerText = res.config.payInfo || "現場付現";
document.getElementById('box1').innerText = res.shopNotice;
document.getElementById('box2').innerText = res.refundNotice;
document.getElementById('box3').innerText = res.privacyPolicy;

if(res.promoText && res.promoText !== "暫無特定行銷活動") {
let pBox = document.getElementById('marketingPromoBox');
let span = document.getElementById('promoTextSpan');
span.innerText = "當期優惠：" + res.promoText;
pBox.classList.remove('hidden');
}

const pTime = document.getElementById('pickupTimeSelect'); pTime.innerHTML = "";
res.config.timeOptions.forEach(t => { pTime.innerHTML += `<option value="${t}">${t}</option>`; });

const pShip = document.getElementById('shipSelectDropdown'); pShip.innerHTML = "";
if(res.shipModes) res.shipModes.split(',').forEach(m => { pShip.innerHTML += `<option value="${m.trim()}">${m.trim()}</option>`; });

handleShipModeChange();

rawData = res.products.map(p => {
let specs = [];
try { specs = p.specsData ? JSON.parse(p.specsData) : []; } catch(e){}

let finalMinPrice = 0;
if (specs && specs.length > 0) {
let parsedPrices = specs.map(v => Number(v.price)).filter(v => v > 0);
if (parsedPrices.length > 0) finalMinPrice = Math.min(...parsedPrices);
}
if (!finalMinPrice || finalMinPrice === 0) {
let pricesArray = p.price ? p.price.toString().split(',').map(num => Number(num.replace(/[^0-9]/g, ""))) : [0];
finalMinPrice = Math.min(...pricesArray);
}
let fallbackUrl = "https://i.postimg.cc/x887dL6Q/line-oa-chat-260617-163106.jpg";
return {
sku: p.sku, name: p.name, status: p.status, category: p.major, sub: p.sub, tag: p.tag, desc: p.desc, arrivalDate: p.arrivalDate || "追加中",
allImagesList: p.allImgs && p.allImgs.length > 0 && p.allImgs[0] !== "" ? p.allImgs : [fallbackUrl],
price: finalMinPrice,
oldPrice: p.oldPrice ? p.oldPrice.toString().split(',')[0] : "0",
rawSpecsData: specs,
colors: p.color ? p.color.split(',') : ["通用規格"],
sizes: p.size ? p.size.split(',') : ["標準尺寸"]
};
});
products = rawData; setupCategoryTabs(res.majorCategories); renderCatalog(products);

// 🚀 正式數據綁定與網址加載咬合：核心修正深層連結無效機制
let urlParams = new URLSearchParams(window.location.search);
let skuKey = urlParams.get('sku');
if(skuKey && rawData && rawData.length > 0) {
let matchedIdx = rawData.findIndex(p => p.sku.trim().toLowerCase() === skuKey.trim().toLowerCase());
if(matchedIdx !== -1) { openProduct(matchedIdx); }
}
});
};

function setupCategoryTabs(cats) {
const box = document.getElementById('categoryTabs');
box.innerHTML = `<button id="tab-all" onclick="filterCat('all')" class="cat-tab-btn px-4 py-2 rounded-full whitespace-nowrap m-1 border border-[indianred] transition-all bg-[indianred] text-white shadow-md font-bold">全部商品</button>`;
cats.forEach(c => {
if(c) box.innerHTML += `<button id="tab-${c.trim()}" onclick="filterCat('${c.trim()}')" class="cat-tab-btn bg-white border border-[#B22222] text-[#B22222] text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all">${c.trim()}</button>`;
});
box.innerHTML += `<button id="tab-fav" onclick="filterFavoritesOnly()" class="cat-tab-btn bg-white border border-rose-300 text-rose-500 text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all">❤️ 我的收藏</button>`;
}

function filterCat(c) {
document.querySelectorAll('.cat-tab-btn').forEach(b => {
if(b.id === 'tab-fav') {
b.className = "cat-tab-btn bg-white border border-rose-200 text-rose-500 text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all";
} else {
b.className = "cat-tab-btn bg-white border border-[#B22222] text-[#B22222] text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all";
}
});
if(c === 'all') {
document.getElementById('tab-all').className = "cat-tab-btn bg-[indianred] text-white text-sm shadow-md font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 border border-[indianred] transition-all";
products = rawData;
} else {
document.getElementById('tab-' + c).className = "cat-tab-btn bg-[indianred] text-white text-sm shadow-md font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 border border-[indianred] transition-all";
products = rawData.filter(x => x.category === c);
}
renderCatalog(products);
}

function filterFavoritesOnly() {
document.querySelectorAll('.cat-tab-btn').forEach(b => {
if(b.id === 'tab-fav') {
b.className = "cat-tab-btn bg-white border border-rose-200 text-rose-500 text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all";
} else {
b.className = "cat-tab-btn bg-white border border-[#B22222] text-[#B22222] text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 shadow-sm transition-all";
}
});
document.getElementById('tab-fav').className = "cat-tab-btn bg-[indianred] text-white text-sm shadow-md font-bold px-4 py-2 rounded-full whitespace-nowrap m-1 border border-[indianred] transition-all";
let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]');
products = rawData.filter(p => favs.includes(p.sku));
renderCatalog(products);
}

function renderCatalog(list) {
const box = document.getElementById('catalog'); box.innerHTML = "";
let active = list.filter(p => p.status !== '下架');
if(active.length === 0) { box.innerHTML = "<p class='col-span-2 text-center py-10 text-xs text-stone-400'>目前無符合條件之商品項目</p>"; return; }
active.forEach((p, i) => {
box.innerHTML += `
<div onclick="openProduct(${rawData.indexOf(p)})" class="bg-white rounded-xl border border-border-soft overflow-hidden shadow-sm flex flex-col cursor-pointer transition-all active:scale-95 bg-white">
<div class="ratio-4-5-box">
<img src="${p.allImagesList[0]}" class="blur-mask-bg">
<img src="${p.allImagesList[0]}" class="perfect-contain-img">
</div>
<div class="p-3 flex flex-col flex-1 justify-between bg-white">
<h2 class="text-sm font-bold text-carbon-black line-clamp-2 h-9 leading-tight">${p.name}</h2>
<div class="flex items-baseline gap-1.5 mt-2 flex-wrap">
${p.oldPrice && p.oldPrice !== "0" ? `<span class="text-xs text-stone-400 font-bold line-through mr-1">NT$ ${p.oldPrice}</span>` : ''}
<span class="text-sm font-bold text-[#B22222]">NT$ ${p.price} 起</span>
</div>
</div>
</div>`;
});
}

function openProduct(idx) {
selectedIdx = idx; const p = rawData[idx];
document.getElementById('qtyInput').innerText = "1"; imgIdx = 0; curImgs = [...p.allImagesList]; activeSpecsPriceMap = {};
if(p.rawSpecsData) { p.rawSpecsData.forEach(sp => { activeSpecsPriceMap[sp.spec] = sp.price; }); }
buildDotsProgressBar(); showMediaImage();
document.getElementById('itemTitle').innerText = p.name;

document.getElementById('itemTagContainer').className = "inline-block bg-white border border-[#B22222] text-[#B22222] text-xs font-bold px-2.5 py-1 rounded-md mb-1 shadow-sm";
document.getElementById('itemTagContainer').innerText = p.tag ? p.tag : "今日推薦";

let formattedShowDate = p.arrivalDate || "追加中";
document.getElementById('itemArrivalDateContainer').innerText = `📅 到貨日期：${formattedShowDate}`;
document.getElementById('itemDesc').innerText = p.desc || "";
document.getElementById('itemImgBlurBg').style.backgroundImage = `url('${curImgs[0]}')`;

const cSel = document.getElementById('colorSelect'); cSel.innerHTML = "";
p.colors.forEach(c => { cSel.innerHTML += `<option value="${c.trim()}">${c.trim()}</option>`; });
const sSel = document.getElementById('sizeSelect'); sSel.innerHTML = "";
p.sizes.forEach(s => { sSel.innerHTML += `<option value="${s.trim()}">${s.trim()}</option>`; });

let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]');
document.getElementById('favProductBtn').innerText = favs.includes(p.sku) ? "❤️ 已收藏" : "❤️ 收藏";
syncMatrixPrice();
document.getElementById('itemModal').className = "fixed inset-0 bg-black/60 backdrop-blur-[2px] flex z-[3000] items-end sm:items-center justify-center p-0";
}

function syncMatrixPrice() {
const p = rawData[selectedIdx]; const c = document.getElementById('colorSelect').value; const s = document.getElementById('sizeSelect').value;
let targetKey = `款式:${c} / ${s}`; let matchedPrice = activeSpecsPriceMap[targetKey];
let matchedSpecsObj = p.rawSpecsData ? p.rawSpecsData.find(v => v.spec === targetKey) : null;
let currentOldPrice = (matchedSpecsObj && matchedSpecsObj.oldPrice) ? matchedSpecsObj.oldPrice : p.oldPrice;

let oldPriceHtml = (currentOldPrice && currentOldPrice !== "0") ? `<span class="text-sm text-stone-400 font-bold line-through mr-1.5">NT$ ${currentOldPrice}</span>` : '';

if (matchedPrice) {
document.getElementById('itemOldPrice').innerHTML = oldPriceHtml;
document.getElementById('itemPrice').innerHTML = `<span class="text-[#B22222] font-bold text-xl">NT$ ${matchedPrice}</span>`;
} else {
document.getElementById('itemOldPrice').innerHTML = oldPriceHtml;
document.getElementById('itemPrice').innerHTML = `<span class="text-[#B22222] font-bold text-xl">NT$ ${p.price} 起</span>`;
}
}

function buildDotsProgressBar() { const container = document.getElementById('dotsContainer'); container.innerHTML = ""; if (curImgs.length <= 1) return; curImgs.forEach((_, i) => { container.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="imgIdx=${i};showMediaImage();event.stopPropagation();"></div>`; }); }
function showMediaImage() { document.getElementById('itemImg').src = curImgs[imgIdx]; let dots = document.querySelectorAll('#dotsContainer .dot'); dots.forEach((d, i) => { if(i === imgIdx) d.classList.add('active'); else d.classList.remove('active'); }); }
function changeImg(dir, e) { if(e) e.stopPropagation(); imgIdx = (imgIdx + dir + curImgs.length) % curImgs.length; showMediaImage(); }
function handleSwipeGesture() { if (touchStartX - touchEndX > 40) changeImg(1); if (touchEndX - touchStartX > 40) changeImg(-1); }
function closeModal() { document.getElementById('itemModal').className = "hidden"; }
function modifyModalQty(amt) { let q = parseInt(document.getElementById('qtyInput').innerText) + amt; if(q < 1) q = 1; document.getElementById('qtyInput').innerText = q; }

function toggleFavorite() {
const p = rawData[selectedIdx]; let favs = JSON.parse(localStorage.getItem('yl_favs') || '[]'); let fIdx = favs.indexOf(p.sku);
if(fIdx !== -1) { favs.splice(fIdx, 1); showCustomAlert("已移出您的收藏庫"); }
else { favs.push(p.sku); showCustomAlert("成功加入您的雲端收藏庫！"); }
localStorage.setItem('yl_favs', JSON.stringify(favs));
document.getElementById('favProductBtn').innerText = favs.includes(p.sku) ? "❤️ 已收藏" : "❤️ 收藏";
let ph = document.getElementById('custPhone').value.trim();
if(ph) fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "handleSyncFavorites", phone: ph, favorites: favs }) });
}

// 🌟 核心硬編碼重構：徹底拋棄原本動態讀取 window.location 產生 cdpn.io 的錯誤邏輯，百分之百寫死對齊 GitHub 正式前台行動商城網址！
function shareProduct() {
let p = rawData[selectedIdx];
let officialFixedBaseUrl = "https://sibyldesign.github.io/elybuy/Index.html";
navigator.clipboard.writeText(officialFixedBaseUrl + "?sku=" + p.sku.trim());
showCustomAlert("🔗 該商品的專屬官方 GitHub 獨立精準分享連結已複製成功！");
}

function addToCart() {
const p = rawData[selectedIdx]; const c = document.getElementById('colorSelect').value; const s = document.getElementById('sizeSelect').value;
let finalUnitPrice = activeSpecsPriceMap[`款式:${c} / ${s}`] || p.price;
cart.push({ sku: p.sku, prodName: p.name, color: c, size: s, price: Number(finalUnitPrice), qty: parseInt(document.getElementById('qtyInput').innerText), arrivalDate: p.arrivalDate || "追加中" });
closeModal(); updateCartUI();
}
function removeCart(idx) { cart.splice(idx,1); updateCartUI(); }
function toggleCart(show) { document.getElementById('cartDrawer').style.transform = show ? "translateY(0)" : "translateY(100%)"; }

function updateCartUI() {
const box = document.getElementById('cartList'); box.innerHTML = ""; let subtotal = 0;
cart.forEach((item, idx) => {
subtotal += item.price * item.qty;
box.innerHTML += `
<div class="py-4 text-sm border-b bg-white flex justify-between items-center">
<div class="space-y-1 flex-1 pr-3">
<div class="font-bold text-stone-900 text-base leading-tight">${item.prodName}</div>
<div class="text-stone-400 text-xs font-medium">貨號：${item.sku} | 規格：${item.color} / ${item.size}</div>
<div class="mt-1"><span class="text-xs font-extrabold text-amber-950 bg-amber-100 border border-amber-400 px-2.5 py-0.5 rounded inline-block shadow-sm">🎯 預計到貨日：${item.arrivalDate}</span></div>
</div>
<div class="text-right shrink-0 px-2 space-y-0.5">
<div class="text-xs text-stone-500 font-medium">數量：<span class="font-bold text-stone-900">${item.qty} 件</span></div>
<div class="text-xs text-stone-400">單價：$${item.price}</div>
<div class="text-sm font-bold text-red-600">小計：$${item.price * item.qty}</div>
</div>
<span onclick="removeCart(${idx})" class="text-stone-300 text-xl font-bold pl-2 cursor-pointer hover:text-red-500 shrink-0">✕</span>
</div>`;
});
let finalTotal = subtotal - currentDiscountValue; if(finalTotal < 0) finalTotal = 0;
document.getElementById('grandTotal').innerText = finalTotal;
const btn = document.getElementById('viewCartBtn'); btn.className = cart.length > 0 ? "bg-[#D4B2A7] text-white text-sm font-bold px-5 py-4 rounded-full shadow-lg fixed right-4 bottom-6 z-50 flex" : "hidden"; btn.innerText = `購物車 (${cart.length})`;
}

function applyDiscountCode() {
let code = document.getElementById('couponCodeInput').value.trim(); if(!code) return showCustomAlert("請輸入折扣碼！");
fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "checkCouponCode", code: code }) }).then(r => r.json()).then(res => { if(res.success && res.match) { currentDiscountValue = Number(res.discount); activatedCouponName = code; document.getElementById('discountMsgBlock').innerText = `🎉 成功套用折扣！已扣除 NT$ ${currentDiscountValue} 元`; document.getElementById('discountMsgBlock').classList.remove('hidden'); document.getElementById('txtDiscountLabel').innerText = `已折抵：-$${currentDiscountValue}`; updateCartUI(); } else { showCustomAlert("輸入之折扣碼無效或已過期！"); } });
}

function searchProducts() {
let kw = document.getElementById('searchInput').value.trim(); if(!kw) return showCustomAlert("請輸入欲搜尋的商品名稱或主貨號！");
products = rawData.filter(p => p.sku.toLowerCase().includes(kw.toLowerCase()) || p.name.toLowerCase().includes(kw.toLowerCase()));
renderCatalog(products);
}

function checkOrderHistory() {
let phone = document.getElementById('searchInput').value.trim(); if(!phone) return showCustomAlert("請先輸入您的手機號碼！");
const container = document.getElementById('multiOrdersContainer');

container.innerHTML = "<div class='text-xs text-stone-400 py-3 animate-pulse flex items-center justify-center gap-1'><span>⏳</span>查詢中...</div>";
document.getElementById('queryResultArea').classList.remove('hidden');

fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "queryOrder", phone: phone }) })
.then(r => r.json()).then(res => {
if(!res.success || !res.allOrders || res.allOrders.length === 0) {
container.innerHTML = "<p class='text-xs text-stone-400 py-4 text-center'>查無此手機號碼的預訂歷史紀錄，請再次核對號碼。</p>";
return;
}
container.innerHTML = "";
res.allOrders.forEach(o => {
let orderItemsHtml = "";

if (o.items) {
if (Array.isArray(o.items)) {
o.items.forEach(itemText => {
orderItemsHtml += `<div class="text-stone-700 bg-stone-50 p-2.5 rounded border border-stone-100 text-xs my-1 font-medium leading-normal">${itemText}</div>`;
});
} else {
orderItemsHtml += `<div class="text-stone-700 bg-stone-50 p-2.5 rounded border border-stone-100 text-xs my-1 font-medium leading-normal">${o.items}</div>`;
}
}

container.innerHTML += `
<div class="py-4 text-sm text-stone-700 bg-white space-y-2 border-b border-stone-100 last:border-none">
<div class="flex justify-between items-center border-b border-dashed pb-1.5">
<b>單號: <span class="text-blue-950 select-all font-mono">${o.orderId || '無單號'}</span></b>
<span class="px-2.5 py-0.5 bg-blue-50 text-blue-700 rounded-full font-bold text-xs">${o.status || '處理中'}</span>
</div>
<div class="space-y-1">${orderItemsHtml}</div>
<div class="grid grid-cols-2 gap-1 text-xs text-stone-500 pt-1">
<div>配送自取：<b class="text-stone-800">${o.shipping || '自取'}</b></div>
<div>取件時間：<b class="text-stone-800">${o.pickupTime || '未備註'}</b></div>
</div>
<div class="text-xs text-stone-500 flex items-center gap-1 pt-0.5">
<span>到貨日期：</span>
<span class="font-bold text-amber-800 bg-amber-50 px-2 py-0.5 rounded border border-amber-200">${o.arrivalDate || '追加中'}</span>
</div>
<div class="text-right text-xs font-bold text-stone-900 pt-1.5 border-t border-stone-50">預訂應付總計：<span class="text-red-600 font-extrabold text-base">NT$ ${o.total || '0'}</span></div>
</div>`;
});
}).catch(() => { container.innerHTML = "<p class='text-xs text-red-500 py-3 text-center font-medium'>主端通道連線異常，請稍後重新操作。</p>"; });
}

function fetchCustomerHistoryData() {
if(globalFetchLock) return;
let phone = document.getElementById('custPhone').value.trim(); if(!phone) return showCustomAlert("請先在下方的手機號碼欄位中填寫，再點擊帶入資料！");
let btn = document.getElementById('btnFetchHistory');
btn.innerText = "查詢帶入中..."; btn.disabled = true; globalFetchLock = true;

fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "getCustomerHistory", phone: phone }) })
.then(r => r.json()).then(res => {
btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false;
if (res && res.success && res.data) {
document.getElementById('custName').value = res.data.custName || "";
document.getElementById('lineName').value = res.data.lineName || "";
document.getElementById('custEmail').value = res.data.email || "";
if(res.data.address) document.getElementById('custAddress').value = res.data.address;
if(res.data.remark) document.getElementById('orderRemark').value = res.data.remark;
showCustomAlert("🎉 帶入成功！已為您自動填入過往的預訂人核對資訊。");
} else { showCustomAlert("查無過往訂購紀錄，請手動填寫新聯絡資訊。"); }
}).catch(() => { btn.innerText = "帶入資料"; btn.disabled = false; globalFetchLock = false; showCustomAlert("網路連線逾時，無法帶入歷史紀錄。"); });
}

function submitFinalOrder() {
let ph = document.getElementById('custPhone'), name = document.getElementById('custName'), line = document.getElementById('lineName'), mail = document.getElementById('custEmail');
let shipMode = document.getElementById('shipSelectDropdown').value;
let pickupTime = document.getElementById('pickupTimeSelect').value;
let custAddress = document.getElementById('custAddress').value.trim();
let orderRemark = document.getElementById('orderRemark').value.trim();

if(!name.value.trim()){ showCustomAlert("請填寫必填欄位：訂購人姓名！"); name.focus(); return; }
if(!ph.value.trim()){ showCustomAlert("請填寫必填欄位：手機號碼！"); ph.focus(); return; }
if(!line.value.trim()){ showCustomAlert("請填寫必填欄位：LINE 暱稱！"); line.focus(); return; }
if(!mail.value.trim()){ showCustomAlert("請填寫必填欄位：電子郵件！"); mail.focus(); return; }

let finalTimeField = "";
let finalAddressField = "";

if (shipMode.includes("來店取貨") || shipMode.includes("自取")) {
if (!pickupTime) { showCustomAlert("請選取『預計取貨時間』！"); return; }
finalTimeField = pickupTime;
finalAddressField = "現場取貨";
} else {
if (!custAddress) { showCustomAlert("您選擇配送到府，請務必填寫完整的『收貨地址』！"); document.getElementById('custAddress').focus(); return; }
finalTimeField = "選宅配";
finalAddressField = custAddress;
}

if(cart.length === 0) return showCustomAlert("購物車目前無 any 品項。");

showCustomAlert("訂單成立中，請稍候...");
let payload = {
cartData: cart,
userInfo: {
phone: ph.value.trim(),
name: name.value.trim(),
lineName: line.value.trim(),
email: mail.value.trim(),
shipping: shipMode,
address: finalTimeField,
grandTotal: document.getElementById('grandTotal').innerText,
shipName: finalAddressField,
remark: orderRemark || "無",
couponUsed: activatedCouponName
}
};

fetch(MASTER_GAS_URL, { method: "POST", body: JSON.stringify({ method: "processOrder", cartData: cart, userInfo: payload.userInfo }) }).then(r => r.json()).then(res => {
if(res.success) {
closeCustomAlert();
setTimeout(() => {
showCustomAlert("下單完成！明細已發送至您的Mail信箱(可能去垃圾信件)。\n也可輸入電話查詢狀態！\n訂單編號：" + res.orderId);
cart = []; currentDiscountValue = 0; activatedCouponName = ""; document.getElementById('couponCodeInput').value = ""; document.getElementById('discountMsgBlock').classList.add('hidden'); document.getElementById('txtDiscountLabel').innerText = ""; updateCartUI(); toggleCart(false);
}, 300);
} else {
showCustomAlert("訂單送出失敗，請再次下單或與LINE客服聯絡");
}
}).catch(() => { showCustomAlert("網路連線逾時，請再次下單或與LINE客服聯絡"); });
}
</script>
